<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Endless Duel</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --color-primary: #8a2be2;
            --color-accent: #ff4500;
            --color-gold: #ffd700;
            --color-bg: #0b0314;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--color-bg);
            font-family: 'Cinzel', 'Georgia', serif;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 3, 20, 0.85);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .panel {
            background: linear-gradient(135deg, #1a0933 0%, #0b0314 100%);
            border: 2px solid var(--color-primary);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5), inset 0 0 10px rgba(255, 69, 0, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--color-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6), 2px 2px #ff4500;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1rem;
            color: #d8bfd8;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(180deg, var(--color-accent) 0%, #b22222 100%);
            border: 1px solid var(--color-gold);
            color: #fff;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 4px 10px rgba(255, 69, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            width: 100%;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 69, 0, 0.2);
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .hud-center {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .hud-box {
            background: rgba(11, 3, 20, 0.7);
            border: 1px solid var(--color-primary);
            border-radius: 8px;
            padding: 10px 15px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .distance-label {
            font-size: 0.8rem;
            color: #a9a9a9;
            text-transform: uppercase;
        }

        .distance-val {
            font-size: 1.6rem;
            color: var(--color-gold);
        }

        .opponent-box {
            text-align: right;
        }

        .timer-val {
            font-size: 1.8rem;
            color: var(--color-accent);
            text-shadow: 0 0 8px var(--color-accent);
        }

        #mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            pointer-events: auto;
            margin-bottom: env(safe-area-inset-bottom, 10px);
        }

        .ctrl-group-left {
            display: flex;
            gap: 10px;
        }

        .ctrl-group-right {
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: rgba(138, 43, 226, 0.3);
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .ctrl-btn:active {
            background: rgba(255, 69, 0, 0.6);
            border-color: var(--color-gold);
        }

        #connection-status {
            font-size: 0.9rem;
            color: #32cd32;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="canvas-container" style="width:100%; height:100%;"></div>

        <div id="hud" class="hidden">
            <div class="hud-top">
                <div class="hud-box">
                    <div class="distance-label">YOUR SCORE</div>
                    <div id="player-distance" class="distance-val">0m</div>
                </div>
                <div class="hud-center">
                    <div id="timer" class="timer-val">60s</div>
                </div>
                <div class="hud-box opponent-box">
                    <div class="distance-label">OPPONENT</div>
                    <div id="opponent-distance" class="distance-val">0m</div>
                </div>
            </div>

            <div id="mobile-controls">
                <div class="ctrl-group-left">
                    <div class="ctrl-btn" id="btn-left">◀</div>
                    <div class="ctrl-btn" id="btn-right">▶</div>
                </div>
                <div class="ctrl-group-right">
                    <div class="ctrl-btn" id="btn-slide">▼</div>
                    <div class="ctrl-btn" id="btn-jump">▲</div>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="overlay">
            <div class="panel">
                <h1>Dragon Duel</h1>
                <p>Welcome to the endless dragon run. Duel your opponent on private parallel tracks.</p>
                <button id="btn-join" class="btn">Find Match</button>
                <div id="connection-status">Ready to duel.</div>
            </div>
        </div>

        <div id="result-screen" class="overlay hidden">
            <div class="panel">
                <h1 id="result-title">VICTORY</h1>
                <p id="result-desc">You dominated the dragon caves!</p>
                <div style="margin-bottom: 25px;">
                    <div>Your Distance: <span id="final-player-dist" style="color:var(--color-gold); font-weight:bold;">0m</span></div>
                    <div>Opponent Distance: <span id="final-opp-dist" style="color:#d8bfd8;">0m</span></div>
                </div>
                <button id="btn-rematch" class="btn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Dragon Endless Duel - Core Game Module
         * Standalone offline version - Lightweight Low-Poly Three.js Engine
         */

        // --- GAME CONFIGURATION ---
        const CONFIG = {
            laneWidth: 4,
            gravity: -0.015,
            jumpStrength: 0.35,
            baseSpeed: 15,
            maxSpeed: 30,
            acceleration: 0.05
        };

        // --- GAME STATE ---
        let gameState = {
            isPlaying: false,
            currentLane: 0, // -1 (Left), 0 (Center), 1 (Right)
            targetX: 0,
            posY: 0,
            velY: 0,
            isJumping: false,
            isSliding: false,
            slideTimer: 0,
            distance: 0,
            speed: CONFIG.baseSpeed,
            opponentDistance: 0,
            opponentAlive: true,
            timeLeft: 60,
            alive: true
        };

        // --- AUDIO ENGINE (Web Audio API Synthesizers) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynthSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'slide') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.45);
            } else if (type === 'victory') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.setValueAtTime(450, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- THREE.JS GRAPHICS SETUP ---
        let scene, camera, renderer, roadGroup;
        let playerMesh;
        const obstacles = [];
        const roadModules = [];
        const moduleLength = 40;

        function init3D() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0314);
            scene.fog = new THREE.FogExp2(0x0a0314, 0.015);

            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 4.5, -6.5);
            camera.lookAt(0, 1.5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x1a0933, 1.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xff4500, 1.5);
            dirLight.position.set(5, 15, -5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            roadGroup = new THREE.Group();
            scene.add(roadGroup);

            // --- CREATE PLAYER USING TEXTURE ---
            createPlayer();

            for (let i = 0; i < 5; i++) {
                spawnTrackModule(i * moduleLength);
            }

            window.addEventListener('resize', onWindowResize);
        }

        // --- PLAYER CREATION WITH SPRITE TEXTURE (UPDATED FILE NAME AND HEIGHT) ---
        function createPlayer() {
            const group = new THREE.Group();

            const loader = new THREE.TextureLoader();
            const texture = loader.load(
                "character.PNG",
                () => console.log("Character image loaded"),
                undefined,
                (err) => console.error("Failed to load character.PNG:", err)
            );
            if (THREE.SRGBColorSpace) {
                texture.colorSpace = THREE.SRGBColorSpace;
            } else {
                texture.encoding = THREE.sRGBEncoding;
            }

            // Aspect ratio based on image dimensions (687 / 1463)
            const aspect = 687 / 1463;
            const planeHeight = 3; // Changed from 1.6 to 3
            const planeWidth = planeHeight * aspect;

            const geo = new THREE.PlaneGeometry(planeWidth, planeHeight);
            geo.translate(0, planeHeight / 2, 0); // feet at y=0

            const mat = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                alphaTest: 0.05,
                side: THREE.DoubleSide
            });

            const sprite = new THREE.Mesh(geo, mat);
            sprite.name = "characterSprite";
            group.add(sprite);

            playerMesh = group;
            scene.add(playerMesh);
        }

        function spawnTrackModule(zOffset) {
            const module = new THREE.Group();
            module.position.z = zOffset;

            const slabGeo = new THREE.BoxGeometry(CONFIG.laneWidth * 3.5, 0.5, moduleLength);
            const slabMat = new THREE.MeshPhongMaterial({ color: 0x241d33, flatShading: true });
            const slab = new THREE.Mesh(slabGeo, slabMat);
            slab.position.y = -0.25;
            module.add(slab);

            const lavaGeo = new THREE.PlaneGeometry(30, moduleLength);
            const lavaMat = new THREE.MeshBasicMaterial({ color: 0xff3300, side: THREE.DoubleSide });
            const lava = new THREE.Mesh(lavaGeo, lavaMat);
            lava.rotation.x = -Math.PI / 2;
            lava.position.y = -2;
            module.add(lava);

            const sideLeft = -8;
            const sideRight = 8;
            
            const pillarGeo = new THREE.CylinderGeometry(0.5, 0.8, 6, 4);
            const pillarMat = new THREE.MeshPhongMaterial({ color: 0x140e1f, flatShading: true });
            const p1 = new THREE.Mesh(pillarGeo, pillarMat);
            p1.position.set(sideLeft, 2.5, 0);
            module.add(p1);

            const crystalGeo = new THREE.OctahedronGeometry(1.5, 0);
            const crystalMat = new THREE.MeshPhongMaterial({ color: 0x8a2be2, emissive: 0x4b0082, flatShading: true });
            const c1 = new THREE.Mesh(crystalGeo, crystalMat);
            c1.position.set(sideRight, 2, 5);
            module.add(c1);

            roadGroup.add(module);
            roadModules.push(module);

            if (zOffset > 20) {
                spawnObstacle(zOffset);
            }
        }

        function spawnObstacle(zBase) {
            const lanes = [-CONFIG.laneWidth, 0, CONFIG.laneWidth];
            const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            const randomType = Math.floor(Math.random() * 3);

            let obsGeo, obsMat, obsY = 0.5;

            if (randomType === 0) {
                obsGeo = new THREE.DodecahedronGeometry(0.8);
                obsMat = new THREE.MeshPhongMaterial({ color: 0xff4500, flatShading: true });
                obsY = 0.6;
            } else if (randomType === 1) {
                obsGeo = new THREE.ConeGeometry(0.4, 2, 4);
                obsMat = new THREE.MeshPhongMaterial({ color: 0x555555, flatShading: true });
                obsY = 1.0;
            } else {
                obsGeo = new THREE.BoxGeometry(CONFIG.laneWidth * 1.2, 0.6, 0.6);
                obsMat = new THREE.MeshPhongMaterial({ color: 0x8b0000, flatShading: true });
                obsY = 2.0; 
            }

            const mesh = new THREE.Mesh(obsGeo, obsMat);
            mesh.position.set(randomLane, obsY, zBase + (Math.random() * 20 - 10));
            scene.add(mesh);

            obstacles.push({
                mesh: mesh,
                lane: randomLane === -CONFIG.laneWidth ? -1 : (randomLane === 0 ? 0 : 1),
                type: randomType,
                y: obsY
            });
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // --- CONTROLS IMPLEMENTATION ---
        function moveLeft() {
            if (!gameState.isPlaying || !gameState.alive) return;
            if (gameState.currentLane > -1) {
                gameState.currentLane--;
                gameState.targetX = gameState.currentLane * CONFIG.laneWidth;
            }
        }

        function moveRight() {
            if (!gameState.isPlaying || !gameState.alive) return;
            if (gameState.currentLane < 1) {
                gameState.currentLane++;
                gameState.targetX = gameState.currentLane * CONFIG.laneWidth;
            }
        }

        function jump() {
            if (!gameState.isPlaying || !gameState.alive) return;
            if (!gameState.isJumping && !gameState.isSliding) {
                gameState.isJumping = true;
                gameState.velY = CONFIG.jumpStrength;
                playSynthSound('jump');
            }
        }

        function slide() {
            if (!gameState.isPlaying || !gameState.alive) return;
            if (!gameState.isJumping && !gameState.isSliding) {
                gameState.isSliding = true;
                gameState.slideTimer = 15;
                playerMesh.scale.y = 0.5;
                playSynthSound('slide');
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') jump();
            if (e.key === 'ArrowDown' || e.key === 's') slide();
        });

        document.getElementById('btn-left')?.addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
        document.getElementById('btn-right')?.addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
        document.getElementById('btn-jump')?.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('btn-slide')?.addEventListener('touchstart', (e) => { e.preventDefault(); slide(); });

        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!gameState.isPlaying) return;
            const diffX = e.changedTouches[0].clientX - touchStartX;
            const diffY = e.changedTouches[0].clientY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 40) moveRight();
                else if (diffX < -40) moveLeft();
            } else {
                if (diffY > 40) slide();
                else if (diffY < -40) jump();
            }
        }, { passive: true });


        // --- LOCAL OPPONENT AI (No server, fully offline) ---
        function triggerMatchmaking() {
            const statusEl = document.getElementById('connection-status');
            if (statusEl) statusEl.innerText = "Finding a rival dragon rider...";
            setTimeout(() => {
                startGame();
            }, 800);
        }

        function updateOpponentAI() {
            if (gameState.opponentAlive && Math.random() < 0.005) {
                gameState.opponentAlive = false;
            }
            if (gameState.opponentAlive) {
                gameState.opponentDistance += (CONFIG.baseSpeed + Math.sin(Date.now() / 1000) * 2) * 0.016;
            }
        }

        // --- MAIN LOOP EXECUTION ---
        let lastTime = 0;

        function update(time) {
            if (!gameState.isPlaying) return;

            const delta = (time - lastTime) / 1000;
            lastTime = time;

            if (gameState.alive) {
                gameState.speed = Math.min(gameState.speed + CONFIG.acceleration * delta, CONFIG.maxSpeed);
                gameState.distance += gameState.speed * delta;
                const distEl = document.getElementById('player-distance');
                if (distEl) distEl.innerText = `${Math.floor(gameState.distance)}m`;
            }

            const oppDistEl = document.getElementById('opponent-distance');
            if (oppDistEl) {
                oppDistEl.innerText = gameState.opponentAlive 
                    ? `${Math.floor(gameState.opponentDistance)}m` 
                    : "CRASHED ☠";
            }

            // Smooth lane movement
            playerMesh.position.x = THREE.MathUtils.lerp(playerMesh.position.x, gameState.targetX, 0.15);

            // Jump physics
            if (gameState.isJumping) {
                gameState.posY += gameState.velY;
                gameState.velY += CONFIG.gravity;
                if (gameState.posY <= 0) {
                    gameState.posY = 0;
                    gameState.isJumping = false;
                }
            }
            playerMesh.position.y = gameState.posY;

            // Slide logic
            if (gameState.isSliding) {
                gameState.slideTimer--;
                if (gameState.slideTimer <= 0) {
                    gameState.isSliding = false;
                    playerMesh.scale.y = 1.0;
                }
            }

            updateOpponentAI();

            // Move road
            roadGroup.position.z -= gameState.speed * delta;

            roadModules.forEach((mod) => {
                const worldZ = mod.position.z + roadGroup.position.z;
                if (worldZ < -moduleLength) {
                    mod.position.z += roadModules.length * moduleLength;
                }
            });

            // Collision detection
            obstacles.forEach((obs) => {
                const obsWorldZ = obs.mesh.position.z + roadGroup.position.z;

                if (obsWorldZ > -0.5 && obsWorldZ < 0.5) {
                    if (obs.lane === gameState.currentLane) {
                        let hit = false;
                        if (obs.type === 2) {
                            if (!gameState.isSliding) hit = true;
                        } else {
                            if (playerMesh.position.y < obs.y) hit = true;
                        }

                        if (hit && gameState.alive) {
                            triggerCrash();
                        }
                    }
                }
            });

            // Cleanup obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obsWorldZ = obstacles[i].mesh.position.z + roadGroup.position.z;
                if (obsWorldZ < -20) {
                    scene.remove(obstacles[i].mesh);
                    obstacles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        // --- GAME STATE TRANSITIONS ---
        function startGame() {
            document.getElementById('lobby-screen')?.classList.add('hidden');
            document.getElementById('result-screen')?.classList.add('hidden');
            document.getElementById('hud')?.classList.remove('hidden');

            gameState = {
                isPlaying: true,
                currentLane: 0,
                targetX: 0,
                posY: 0,
                velY: 0,
                isJumping: false,
                isSliding: false,
                slideTimer: 0,
                distance: 0,
                speed: CONFIG.baseSpeed,
                opponentDistance: 0,
                opponentAlive: true,
                timeLeft: 60,
                alive: true
            };

            roadGroup.position.set(0, 0, 0);
            playerMesh.position.set(0, 0, 0);

            obstacles.forEach(o => scene.remove(o.mesh));
            obstacles.length = 0;

            const gameTimer = setInterval(() => {
                if (!gameState.isPlaying) {
                    clearInterval(gameTimer);
                    return;
                }
                gameState.timeLeft--;
                const timerEl = document.getElementById('timer');
                if (timerEl) timerEl.innerText = `${gameState.timeLeft}s`;

                if (gameState.timeLeft <= 0) {
                    clearInterval(gameTimer);
                    evaluateWinner();
                }
            }, 1000);

            lastTime = performance.now();
            requestAnimationFrame(update);
        }

        function triggerCrash() {
            gameState.alive = false;
            playSynthSound('crash');

            if (!gameState.opponentAlive) {
                evaluateWinner();
            } else {
                const distEl = document.getElementById('player-distance');
                if (distEl) distEl.innerText = "CRASHED ☠";
                setTimeout(() => {
                    evaluateWinner();
                }, 1500);
            }
        }

        function evaluateWinner() {
            gameState.isPlaying = false;
            let isVictory = false;
            let reason = "";

            if (!gameState.alive && !gameState.opponentAlive) {
                if (gameState.distance >= gameState.opponentDistance) {
                    isVictory = true;
                    reason = "You both crashed, but you advanced further!";
                } else {
                    isVictory = false;
                    reason = "You both crashed, but your opponent outdistanced you!";
                }
            } else if (!gameState.alive) {
                isVictory = false;
                reason = "You got burned by dragon fire/obstacles!";
            } else if (!gameState.opponentAlive) {
                isVictory = true;
                reason = "Your opponent crashed! The crown is yours.";
            } else {
                if (gameState.distance >= gameState.opponentDistance) {
                    isVictory = true;
                    reason = "Time elapsed! You ruled the road.";
                } else {
                    isVictory = false;
                    reason = "Time elapsed! Opponent outdistanced you.";
                }
            }

            endGame(isVictory, reason);
        }

        function endGame(isVictory, desc) {
            gameState.isPlaying = false;
            document.getElementById('hud')?.classList.add('hidden');
            
            const resultScreen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');

            if (title) {
                title.innerText = isVictory ? "VICTORY" : "DEFEAT";
                title.style.color = isVictory ? "var(--color-gold)" : "var(--color-accent)";
            }
            if (descEl) descEl.innerText = desc;

            const finalPlayerDist = document.getElementById('final-player-dist');
            const finalOppDist = document.getElementById('final-opp-dist');
            if (finalPlayerDist) finalPlayerDist.innerText = `${Math.floor(gameState.distance)}m`;
            if (finalOppDist) finalOppDist.innerText = `${Math.floor(gameState.opponentDistance)}m`;

            if (isVictory) playSynthSound('victory');

            resultScreen?.classList.remove('hidden');
        }

        // --- INITIALIZATION TRIGGER ---
        window.addEventListener('load', () => {
            init3D();

            document.getElementById('btn-join')?.addEventListener('click', () => {
                triggerMatchmaking();
            });

            document.getElementById('btn-rematch')?.addEventListener('click', () => {
                triggerMatchmaking();
            });
        });
    </script>
</body>
</html>
