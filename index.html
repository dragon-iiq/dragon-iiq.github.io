<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تـتـريـس • تصميم فاخر</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1a1e2f, #0b0d17);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 20px;
      touch-action: pan-y;
    }

    .game-wrapper {
      background: rgba(20, 25, 45, 0.65);
      backdrop-filter: blur(6px);
      border-radius: 56px;
      padding: 35px 45px;
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 215, 100, 0.15);
      max-width: 820px;
      width: fit-content;
      margin: 0 auto;
    }

    .game-container {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 40px;
      justify-content: center;
    }

    .board-section {
      position: relative;
      cursor: pointer;
    }

    canvas#tetrisCanvas {
      display: block;
      width: 352px;
      height: 352px;
      border-radius: 32px;
      background: #0f1322;
      box-shadow: 
        inset 0 -8px 0 #05070e,
        inset 0 8px 12px rgba(255, 215, 100, 0.08),
        0 20px 35px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 215, 100, 0.2);
      transition: box-shadow 0.2s;
      touch-action: none;
    }

    /* === HUD Panel === */
    .hud-panel {
      display: flex;
      gap: 14px;
      margin-bottom: 22px;
    }
    .hud-item {
      flex: 1;
      background: rgba(12, 16, 30, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 14px 8px;
      border: 1px solid rgba(255, 215, 100, 0.08);
      text-align: center;
    }
    .hud-label { 
      color: #d4c9a8; 
      font-size: 12px; 
      letter-spacing: 1px; 
      opacity: 0.8; 
    }
    .hud-value { 
      display: block; 
      color: #fadf9e; 
      font-size: 26px; 
      font-weight: 600; 
      text-shadow: 0 0 10px #ffb34740; 
      margin-top: 4px; 
    }

    /* === CSS للإشعار === */
    .game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(5, 7, 14, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    .game-over-overlay.show {
      display: flex;
      pointer-events: auto;
    }

    .game-over-box {
      text-align: center;
      color: #f0e8d0;
      padding: 20px;
    }

    .game-over-box h2 {
      font-size: 26px;
      color: #e86f6f;
      margin-bottom: 12px;
      text-shadow: 0 0 15px #e86f6f60;
    }

    .game-over-box p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .game-over-box span {
      color: #fadf9e;
      font-weight: 600;
      font-size: 24px;
    }

    .game-over-box .btn {
      display: inline-block;
      padding: 12px 30px;
      background: #2f1e2e;
      border: 1px solid #c78a7a50;
      color: #ede7d7;
      border-radius: 60px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1.5px;
      box-shadow: 0 6px 0 #070a14;
      transition: all 0.2s ease;
      touch-action: manipulation;
      pointer-events: auto;
    }

    .game-over-box .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #070a14;
      background: #4f2a3a;
    }

    /* === استجابة للشاشات الصغيرة === */
    @media (max-width: 820px) {
      .game-wrapper { padding: 25px 30px; }
    }

    @media (max-width: 700px) {
      .game-wrapper { padding: 20px; }
      .game-container { gap: 25px; }
      canvas#tetrisCanvas { width: 320px; height: 320px; }
      .hud-panel { gap: 10px; }
      .hud-value { font-size: 22px; }
    }

    @media (max-width: 480px) {
      .game-wrapper { padding: 12px; border-radius: 32px; }
      .game-container { gap: 20px; }
      canvas#tetrisCanvas { width: 280px; height: 280px; }
      .hud-panel { gap: 8px; margin-bottom: 16px; }
      .hud-item { padding: 10px 6px; border-radius: 18px; }
      .hud-value { font-size: 20px; }
      .hud-label { font-size: 10px; }
      .game-over-box h2 { font-size: 20px; }
      .game-over-box p { font-size: 14px; }
      .game-over-box span { font-size: 18px; }
      .game-over-box .btn { padding: 10px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  
  <!-- HUD Panel -->
  <div class="hud-panel">
    <div class="hud-item">
      <span class="hud-label">النقاط</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">الهدف</span>
      <span class="hud-value" id="targetDisplay">25</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">الحركات</span>
      <span class="hud-value" id="movesDisplay">25</span>
    </div>
  </div>

  <div class="game-container">
    <div class="board-section">
      <canvas id="tetrisCanvas" width="352" height="352"></canvas>
      
      <!-- إشعار الخسارة -->
      <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-box">
          <h2 id="gameOverTitle">💀 انتهت اللعبة</h2>
          <p>نقاطك: <span id="finalScore">0</span></p>
          <div class="btn" id="exitBtn">✕ خروج</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  (function(){
    const COLS = 8;
    const ROWS = 8;
    const BLOCK_SIZE = 44;
    const BLOCK_COLORS = ['#e86f6f', '#f7e476', '#6fcf97', '#5a8cf0', '#b484e0'];
    const FALL_SPEED = 32; // px/frame
    const BLAST_DURATION = 220; // ms

    let board = [];
    let fallOffset = []; // px still to fall, per cell
    let score = 0;
    let moves = 25;
    let target = 25;
    const targetColor = BLOCK_COLORS[0];
    let gameOver = false;
    let locked = false; // true while blast/fall animation is running
    let blastAnims = []; // {row, col, color, start}
    let shuffleMsgUntil = 0;

    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    
    const W = COLS * BLOCK_SIZE;
    const H = ROWS * BLOCK_SIZE;

    // ===== دوال تحويل الألوان =====
    function hexToRgb(hex) {
        const v = hex.replace('#','');
        return {
            r: parseInt(v.substring(0,2),16),
            g: parseInt(v.substring(2,4),16),
            b: parseInt(v.substring(4,6),16)
        };
    }

    function lighten(hex, amt) {
        const {r,g,b} = hexToRgb(hex);
        return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
    }

    function darken(hex, amt) {
        const {r,g,b} = hexToRgb(hex);
        return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
    }

    // ===== رسم خلايا غائرة (Sockets) =====
    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    function drawCellSockets() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const x = c * BLOCK_SIZE;
                const y = r * BLOCK_SIZE;
                const isDark = (r + c) % 2 === 0;
                const base = isDark ? '#1a2038' : '#212a48';
                const inset = isDark ? '#0e1226' : '#141a30';

                // تدرج غاطس: غامق في المنتصف يفتح للحواف
                const grad = ctx.createRadialGradient(
                    x + BLOCK_SIZE/2, y + BLOCK_SIZE/2, BLOCK_SIZE*0.1,
                    x + BLOCK_SIZE/2, y + BLOCK_SIZE/2, BLOCK_SIZE*0.75
                );
                grad.addColorStop(0, inset);
                grad.addColorStop(1, base);

                ctx.fillStyle = grad;
                roundRect(x + 1, y + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2, 6);
                ctx.fill();

                // ظل داخلي علوي (bevel غاطس)
                ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x + 4, y + 2);
                ctx.lineTo(x + BLOCK_SIZE - 4, y + 2);
                ctx.stroke();

                // إضاءة داخلية سفلية خفيفة
                ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                ctx.beginPath();
                ctx.moveTo(x + 4, y + BLOCK_SIZE - 2);
                ctx.lineTo(x + BLOCK_SIZE - 4, y + BLOCK_SIZE - 2);
                ctx.stroke();
            }
        }
    }

    // ===== رسم كرة حلوى ثلاثية الأبعاد =====
    function drawCandyBall(cx, cy, radius, color) {
        // ظل تحت الكرة
        ctx.beginPath();
        ctx.ellipse(cx, cy + radius*0.55, radius*0.85, radius*0.25, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fill();

        // جسم الكرة بتدرج داكن-فاتح
        const grad = ctx.createRadialGradient(
            cx - radius*0.35, cy - radius*0.35, radius*0.15,
            cx, cy, radius
        );
        grad.addColorStop(0, lighten(color, 60));
        grad.addColorStop(0.55, color);
        grad.addColorStop(1, darken(color, 25));

        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.shadowColor = color + '90';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;

        // حافة داكنة رفيعة
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI*2);
        ctx.strokeStyle = darken(color, 35);
        ctx.lineWidth = 1.2;
        ctx.stroke();

        // بريق لامع (highlight)
        ctx.beginPath();
        ctx.ellipse(cx - radius*0.32, cy - radius*0.35, radius*0.32, radius*0.18, -0.6, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();

        // بريق صغير ثانوي
        ctx.beginPath();
        ctx.arc(cx + radius*0.3, cy + radius*0.25, radius*0.1, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fill();
    }

    function haptic(style = 'light') {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
        }
    }

    function exitGame() {
        haptic('medium');
        if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close();
        else window.close();
    }

    function randomColor() {
        return BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
    }

    function initBoard() {
        board = Array(ROWS).fill().map(() => Array(COLS).fill().map(() => randomColor()));
        fallOffset = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        ensureSolvable();
    }

    function getConnectedGroup(row, col) {
        const color = board[row][col];
        if (color === 0) return [];
        const visited = new Set();
        const group = [];
        const stack = [[row, col]];
        const key = (r, c) => r + '_' + c;
        visited.add(key(row, col));
        while (stack.length) {
            const [r, c] = stack.pop();
            group.push([r, c]);
            for (const [nr, nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]) {
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                    const k = key(nr, nc);
                    if (!visited.has(k) && board[nr][nc] === color) {
                        visited.add(k);
                        stack.push([nr, nc]);
                    }
                }
            }
        }
        return group;
    }

    // === كشف الجمود (لا حركة صالحة) ===
    function hasValidMoves() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const color = board[r][c];
                if (color === 0) continue;
                if (c + 1 < COLS && board[r][c+1] === color) return true;
                if (r + 1 < ROWS && board[r+1][c] === color) return true;
            }
        }
        return false;
    }

    function ensureSolvable() {
        let tries = 0;
        while (!hasValidMoves() && tries < 200) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) board[r][c] = randomColor();
            }
            tries++;
        }
    }

    function reshuffleBoard() {
        ensureSolvable();
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) fallOffset[r][c] = BLOCK_SIZE * 0.6;
        }
        shuffleMsgUntil = performance.now() + 1100;
        haptic('medium');
    }

    // === انهيار مع حساب مسافة السقوط لكل خلية (للأنيميشن) ===
    function collapseAndRefill() {
        for (let c = 0; c < COLS; c++) {
            const oldColors = [];
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r][c] !== 0) oldColors.push(r);
            }
            const stack = oldColors.map(r => board[r][c]);
            const newFallFrom = [];
            for (let r = ROWS - 1; r >= 0; r--) {
                if (stack.length) {
                    board[r][c] = stack.shift();
                    const sourceRow = oldColors.shift();
                    newFallFrom.push([r, sourceRow]);
                } else {
                    board[r][c] = randomColor();
                    newFallFrom.push([r, -1]); // قادمة من فوق اللوحة
                }
            }
            for (const [destRow, sourceRow] of newFallFrom) {
                const distance = sourceRow === -1 ? (destRow + 1) : (destRow - sourceRow);
                fallOffset[destRow][c] = Math.max(0, distance) * BLOCK_SIZE;
            }
        }
        if (!hasValidMoves()) reshuffleBoard();
    }

    function tryBlast(row, col) {
        if (gameOver || locked || row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
        const color = board[row][col];
        if (color === 0) return;
        const group = getConnectedGroup(row, col);
        if (group.length < 2) { haptic('light'); return; }
        haptic('medium');
        locked = true;
        let targetHits = 0;
        const now = performance.now();
        for (const [r, c] of group) {
            if (board[r][c] === targetColor) targetHits++;
            blastAnims.push({ row: r, col: c, color: board[r][c], start: now });
            board[r][c] = 0;
        }
        score += group.length * 15;
        target = Math.max(0, target - targetHits);
        moves--;
        updateHUD();
        setTimeout(() => {
            blastAnims = [];
            collapseAndRefill();
            checkEnd();
        }, BLAST_DURATION);
    }

    function checkEnd() {
        if (target <= 0) endGame(true);
        else if (moves <= 0) endGame(false);
    }

    function endGame(won) {
        gameOver = true;
        document.getElementById('gameOverTitle').textContent = won ? '🎉 لقد فزت!' : '💀 انتهت اللعبة';
        document.getElementById('finalScore').textContent = score;
        gameOverOverlay.classList.add('show');
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred(won ? 'success' : 'error');
        }
    }

    function updateHUD() {
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('targetDisplay').textContent = target;
        document.getElementById('movesDisplay').textContent = moves;
    }

    function drawBoard() {
        ctx.clearRect(0, 0, W, H);
        drawCellSockets();

        // الكرات الثابتة/الساقطة
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const color = board[r][c];
                if (color === 0) continue;
                const offset = fallOffset[r][c] || 0;
                const y = r * BLOCK_SIZE - offset;
                drawCandyBall(c*BLOCK_SIZE + BLOCK_SIZE/2, y + BLOCK_SIZE/2, BLOCK_SIZE*0.42, color);
            }
        }

        // أنيميشن الانفجار (تلاشي + تكبير)
        const now = performance.now();
        for (const b of blastAnims) {
            const progress = Math.min(1, (now - b.start) / BLAST_DURATION);
            const alpha = 1 - progress;
            const scale = 1 + 0.4 * progress; // تكبر شوي وهي بتختفي
            const cx = b.col * BLOCK_SIZE + BLOCK_SIZE / 2;
            const cy = b.row * BLOCK_SIZE + BLOCK_SIZE / 2;
            ctx.globalAlpha = alpha;
            drawCandyBall(cx, cy, BLOCK_SIZE*0.42*scale, b.color);
            ctx.globalAlpha = 1;
        }

        // رسالة إعادة الخلط
        if (now < shuffleMsgUntil) {
            ctx.fillStyle = 'rgba(5,7,14,0.55)';
            ctx.fillRect(0, H/2 - 30, W, 60);
            ctx.fillStyle = '#fadf9e';
            ctx.font = '600 18px Segoe UI, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🔄 تم خلط اللوحة', W/2, H/2 + 6);
        }
    }

    // === حلقة الأنيميشن المستمرة ===
    function animate() {
        let stillFalling = false;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (fallOffset[r][c] > 0) {
                    fallOffset[r][c] = Math.max(0, fallOffset[r][c] - FALL_SPEED);
                    if (fallOffset[r][c] > 0) stillFalling = true;
                }
            }
        }
        if (locked && blastAnims.length === 0 && !stillFalling) locked = false;
        drawBoard();
        requestAnimationFrame(animate);
    }

    function resetGame() {
        gameOverOverlay.classList.remove('show');
        score = 0; moves = 25; target = 25; gameOver = false; locked = false;
        blastAnims = []; shuffleMsgUntil = 0;
        initBoard();
        updateHUD();
    }

    function handleTap(e) {
        e.preventDefault();
        if (gameOver || locked) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const col = Math.floor((clientX - rect.left) * scaleX / BLOCK_SIZE);
        const row = Math.floor((clientY - rect.top) * scaleY / BLOCK_SIZE);
        tryBlast(row, col);
    }

    function initControls() {
        canvas.addEventListener('touchstart', handleTap, { passive: false });
        canvas.addEventListener('click', handleTap);
        document.getElementById('exitBtn').addEventListener('touchstart', (e) => { e.preventDefault(); exitGame(); });
        document.getElementById('exitBtn').addEventListener('click', exitGame);
    }

    initControls();
    resetGame();
    requestAnimationFrame(animate);
})();
</script>
</body>
</html>
