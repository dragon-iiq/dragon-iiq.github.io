<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تـتـريـس • تصميم فاخر</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1a1e2f, #0b0d17);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 20px;
      touch-action: pan-y;
    }

    .game-wrapper {
      background: rgba(20, 25, 45, 0.65);
      backdrop-filter: blur(6px);
      border-radius: 56px;
      padding: 35px 45px;
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 215, 100, 0.15);
      max-width: 720px;
      width: fit-content;
      margin: 0 auto;
    }

    .game-container {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 40px;
      justify-content: center;
    }

    .board-section {
      position: relative;
    }

    canvas#tetrisCanvas {
      display: block;
      width: 300px;
      height: 600px;
      border-radius: 32px;
      background: #0f1322;
      box-shadow: 
        inset 0 -8px 0 #05070e,
        inset 0 8px 12px rgba(255, 215, 100, 0.08),
        0 20px 35px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 215, 100, 0.2);
      transition: box-shadow 0.2s;
    }

    /* === CSS للإشعار === */
    .game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(5, 7, 14, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .game-over-overlay.show {
      display: flex;
    }

    .game-over-box {
      text-align: center;
      color: #f0e8d0;
      padding: 20px;
    }

    .game-over-box h2 {
      font-size: 26px;
      color: #e86f6f;
      margin-bottom: 12px;
      text-shadow: 0 0 15px #e86f6f60;
    }

    .game-over-box p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .game-over-box span {
      color: #fadf9e;
      font-weight: 600;
      font-size: 24px;
    }

    .game-over-box .btn {
      display: inline-block;
      padding: 12px 30px;
      background: #2f1e2e;
      border: 1px solid #c78a7a50;
      color: #ede7d7;
      border-radius: 60px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1.5px;
      box-shadow: 0 6px 0 #070a14;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .game-over-box .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #070a14;
      background: #4f2a3a;
    }

    /* === لوحة النقاط (منقولة للخارج) === */
    .score-panel {
      background: rgba(12, 16, 30, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 22px 20px;
      border: 1px solid rgba(255, 215, 100, 0.08);
      text-align: center;
      margin-bottom: 28px;
    }

    .score-panel div {
      color: #f0e8d0;
      font-size: 20px;
      letter-spacing: 1px;
      font-weight: 300;
    }

    .score-panel span {
      display: block;
      font-size: 42px;
      font-weight: 600;
      color: #fadf9e;
      text-shadow: 0 0 12px #ffb34740, 0 4px 8px black;
      margin-top: 4px;
      line-height: 1.2;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 28px;
      min-width: 160px;
    }

    .next-piece {
      background: rgba(12, 16, 30, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 22px 20px 20px;
      border: 1px solid rgba(255, 215, 100, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 12px 20px rgba(0, 0, 0, 0.5);
    }

    .next-piece h3 {
      color: #d4c9a8;
      font-weight: 400;
      letter-spacing: 2px;
      font-size: 15px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 18px;
      opacity: 0.8;
      text-shadow: 0 2px 3px black;
    }

    canvas#nextCanvas {
      display: block;
      width: 120px;
      height: 120px;
      margin: 0 auto;
      background: #0a0d1a;
      border-radius: 24px;
      box-shadow: inset 0 0 0 1px rgba(255, 215, 100, 0.05);
    }

    /* === CSS لأزرار اللمس === */
    .touch-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .touch-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .touch-btn {
      background: #1e233b;
      border: 1px solid rgba(255, 215, 100, 0.25);
      color: #ede7d7;
      font-size: 22px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 #070a14;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.08s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .touch-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #070a14;
      background: #2d3457;
      border-color: #f5c54260;
    }

    /* === استجابة للشاشات الصغيرة === */
    @media (max-width: 700px) {
      .game-wrapper { padding: 20px; }
      .game-container { gap: 25px; }
      canvas#tetrisCanvas { width: 240px; height: 480px; }
      .side-panel { min-width: 130px; }
      .touch-btn { width: 48px; height: 48px; font-size: 18px; }
      .game-over-box h2 { font-size: 22px; }
      .game-over-box p { font-size: 16px; }
      .game-over-box span { font-size: 20px; }
      .score-panel span { font-size: 34px; }
    }

    @media (max-width: 480px) {
      .game-wrapper { padding: 12px; border-radius: 32px; }
      .game-container { gap: 25px; }
      canvas#tetrisCanvas { width: 200px; height: 400px; }
      .side-panel { min-width: 100px; gap: 16px; }
      .next-piece { padding: 12px; }
      canvas#nextCanvas { width: 80px; height: 80px; }
      .score-panel { padding: 16px 12px; margin-bottom: 20px; }
      .score-panel span { font-size: 30px; }
      .touch-btn { width: 42px; height: 42px; font-size: 16px; border-radius: 12px; }
      .game-over-box h2 { font-size: 20px; }
      .game-over-box p { font-size: 14px; }
      .game-over-box span { font-size: 18px; }
      .game-over-box .btn { padding: 10px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  
  <!-- لوحة النقاط (في الأعلى) -->
  <div class="score-panel">
    <div>نقاط</div>
    <span id="scoreDisplay">0</span>
  </div>

  <div class="game-container">
    <div class="board-section">
      <canvas id="tetrisCanvas" width="300" height="600"></canvas>
      
      <!-- إشعار الخسارة -->
      <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-box">
          <h2>💀 انتهت اللعبة</h2>
          <p>نقاطك: <span id="finalScore">0</span></p>
          <div class="btn" id="exitBtn">✕ خروج</div>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="next-piece">
        <h3>• القادم •</h3>
        <canvas id="nextCanvas" width="120" height="120"></canvas>
      </div>

      <!-- أزرار اللمس -->
      <div class="touch-controls">
        <div class="touch-row">
          <div class="touch-btn" id="btnLeft">⬅</div>
          <div class="touch-btn" id="btnRotate">⟳</div>
          <div class="touch-btn" id="btnRight">➡</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  (function(){
    // ----- إعدادات اللوحة -----
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 30;

    // ----- تعريف القطع (Tetrominos) -----
    const SHAPES = [
        { matrix: [[1,1,1,1]], color: '#3ae0f2' },
        { matrix: [[1,1],[1,1]], color: '#f7e476' },
        { matrix: [[0,1,0],[1,1,1]], color: '#b484e0' },
        { matrix: [[0,1,1],[1,1,0]], color: '#6fcf97' },
        { matrix: [[1,1,0],[0,1,1]], color: '#e86f6f' },
        { matrix: [[1,0,0],[1,1,1]], color: '#f0a55a' },
        { matrix: [[0,0,1],[1,1,1]], color: '#5a8cf0' }
    ];

    // ----- الحالة العامة -----
    let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    let score = 0;
    let gameOver = false;
    let paused = false;

    let currentPiece = {
        matrix: [],
        color: '#ffffff',
        row: 0,
        col: 3
    };

    let nextPiece = null;

    // عناصر DOM
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreSpan = document.getElementById('finalScore');

    // ===== دالة الاهتزاز (Haptic Feedback) =====
    function haptic(style = 'light') {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
        }
    }

    // ===== دالة الخروج =====
    function exitGame() {
        haptic('medium');
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.close();
        } else {
            // fallback خارج تيليجرام
            window.close();
        }
    }

    // ----- الأدوات المساعدة -----
    function randomPiece() {
        const idx = Math.floor(Math.random() * SHAPES.length);
        const shape = SHAPES[idx];
        return {
            matrix: shape.matrix.map(row => [...row]),
            color: shape.color
        };
    }

    function rotateMatrix(matrix) {
        const rows = matrix.length;
        const cols = matrix[0].length;
        const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                rotated[c][rows - 1 - r] = matrix[r][c];
            }
        }
        return rotated;
    }

    function isValid(matrix, row, col) {
        for (let r = 0; r < matrix.length; r++) {
            for (let c = 0; c < matrix[0].length; c++) {
                if (matrix[r][c] !== 0) {
                    const newX = col + c;
                    const newY = row + r;
                    if (newX < 0 || newX >= COLS || newY >= ROWS || newY < 0) return false;
                    if (newY >= 0 && board[newY][newX] !== 0) return false;
                }
            }
        }
        return true;
    }

    function mergePiece() {
        const { matrix, row, col, color } = currentPiece;
        for (let r = 0; r < matrix.length; r++) {
            for (let c = 0; c < matrix[0].length; c++) {
                if (matrix[r][c] !== 0) {
                    const boardRow = row + r;
                    const boardCol = col + c;
                    if (boardRow >= 0 && boardRow < ROWS && boardCol >= 0 && boardCol < COLS) {
                        board[boardRow][boardCol] = color;
                    }
                }
            }
        }
    }

    function clearFullRows() {
        let cleared = 0;
        for (let r = ROWS - 1; r >= 0; ) {
            let full = true;
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === 0) { full = false; break; }
            }
            if (full) {
                for (let r2 = r; r2 > 0; r2--) {
                    board[r2] = [...board[r2-1]];
                }
                board[0] = Array(COLS).fill(0);
                cleared++;
            } else {
                r--;
            }
        }
        if (cleared > 0) {
            const points = [0, 100, 300, 600, 1000];
            const addScore = points[Math.min(cleared,4)];
            score += addScore;
            updateScore();
            
            const newSpeed = getSpeedForScore();
            if (newSpeed !== currentSpeed) {
                currentSpeed = newSpeed;
                startLoop();
            }
        }
    }

    function spawnNewPiece() {
        if (!nextPiece) {
            nextPiece = randomPiece();
        }
        currentPiece.matrix = nextPiece.matrix.map(row => [...row]);
        currentPiece.color = nextPiece.color;
        currentPiece.row = 0;
        currentPiece.col = Math.floor((COLS - currentPiece.matrix[0].length) / 2);

        nextPiece = randomPiece();

        if (!isValid(currentPiece.matrix, currentPiece.row, currentPiece.col)) {
            gameOver = true;
            paused = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
            
            // === اهتزاز قوي عند الخسارة ===
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
            }
        }
    }

    function lockPiece() {
        if (gameOver) return;
        mergePiece();
        clearFullRows();
        spawnNewPiece();
        renderAll();
    }

    function moveDown() {
        if (paused || gameOver) return false;
        const { matrix, row, col } = currentPiece;
        if (isValid(matrix, row + 1, col)) {
            currentPiece.row++;
            renderAll();
            return true;
        } else {
            lockPiece();
            renderAll();
            return false;
        }
    }

    // ----- التحكم -----
    function moveLeft() {
        if (paused || gameOver) return;
        if (isValid(currentPiece.matrix, currentPiece.row, currentPiece.col - 1)) {
            currentPiece.col--;
            renderAll();
        }
    }

    function moveRight() {
        if (paused || gameOver) return;
        if (isValid(currentPiece.matrix, currentPiece.row, currentPiece.col + 1)) {
            currentPiece.col++;
            renderAll();
        }
    }

    function rotatePiece() {
        if (paused || gameOver) return;
        const rotated = rotateMatrix(currentPiece.matrix);
        if (isValid(rotated, currentPiece.row, currentPiece.col)) {
            currentPiece.matrix = rotated;
            renderAll();
        }
    }

    // ----- العرض -----
    function drawBoard() {
        ctx.clearRect(0, 0, 300, 600);
        ctx.fillStyle = '#0f1322';
        ctx.fillRect(0, 0, 300, 600);

        ctx.strokeStyle = '#222a44';
        ctx.lineWidth = 0.5;
        for (let r = 0; r <= ROWS; r++) {
            ctx.beginPath();
            ctx.moveTo(0, r * BLOCK_SIZE);
            ctx.lineTo(300, r * BLOCK_SIZE);
            ctx.stroke();
        }
        for (let c = 0; c <= COLS; c++) {
            ctx.beginPath();
            ctx.moveTo(c * BLOCK_SIZE, 0);
            ctx.lineTo(c * BLOCK_SIZE, 600);
            ctx.stroke();
        }

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const color = board[r][c];
                if (color !== 0) {
                    ctx.fillStyle = color;
                    ctx.shadowColor = '#ffffff30';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(c * BLOCK_SIZE + 1, r * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.fillRect(c * BLOCK_SIZE + 3, r * BLOCK_SIZE + 3, 6, 4);
                }
            }
        }

        if (!gameOver && currentPiece.matrix) {
            const { matrix, row, col, color } = currentPiece;
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[0].length; c++) {
                    if (matrix[r][c] !== 0) {
                        const x = (col + c) * BLOCK_SIZE;
                        const y = (row + r) * BLOCK_SIZE;
                        ctx.fillStyle = color;
                        ctx.shadowColor = '#f5e56b60';
                        ctx.shadowBlur = 14;
                        ctx.fillRect(x + 1, y + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = 'rgba(255,255,240,0.2)';
                        ctx.fillRect(x + 4, y + 4, 6, 4);
                    }
                }
            }
        }
    }

    function drawNext() {
        nextCtx.clearRect(0, 0, 120, 120);
        nextCtx.fillStyle = '#0a0d1a';
        nextCtx.fillRect(0, 0, 120, 120);
        if (nextPiece) {
            const matrix = nextPiece.matrix;
            const color = nextPiece.color;
            const block = 24;
            const cols = matrix[0].length;
            const rows = matrix.length;
            const offsetX = (5 - cols) * block / 2;
            const offsetY = (5 - rows) * block / 2;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (matrix[r][c] !== 0) {
                        const x = offsetX + c * block;
                        const y = offsetY + r * block;
                        nextCtx.fillStyle = color;
                        nextCtx.shadowColor = '#f5e56b40';
                        nextCtx.shadowBlur = 12;
                        nextCtx.fillRect(x + 1, y + 1, block - 2, block - 2);
                        nextCtx.shadowBlur = 0;
                    }
                }
            }
        }
    }

    function updateScore() {
        scoreDisplay.textContent = score;
    }

    function renderAll() {
        drawBoard();
        drawNext();
        updateScore();
    }

    // ----- إعادة تعيين (مع إخفاء الإشعار) -----
    function resetGame() {
        document.getElementById('gameOverOverlay').classList.remove('show');
        board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        score = 0;
        gameOver = false;
        paused = false;
        nextPiece = randomPiece();
        spawnNewPiece();
        currentSpeed = getSpeedForScore();
        renderAll();
        startLoop();
    }

    // ----- تسريع تدريجي -----
    let currentSpeed = 420;
    const MIN_SPEED = 100;

    function getSpeedForScore() {
        const level = Math.floor(score / 500);
        return Math.max(MIN_SPEED, 420 - level * 20);
    }

    function startLoop() {
        if (gameInterval) clearInterval(gameInterval);
        currentSpeed = getSpeedForScore();
        gameInterval = setInterval(() => {
            if (!paused && !gameOver) {
                moveDown();
                const newSpeed = getSpeedForScore();
                if (newSpeed !== currentSpeed) {
                    currentSpeed = newSpeed;
                    startLoop();
                }
            }
        }, currentSpeed);
    }

    // ----- الحلقة -----
    let gameInterval = null;

    // ===== دالة الضغط المستمر (Hold-to-repeat) - نسخة اللمس فقط =====
    function addHoldRepeat(element, action, delay = 350, interval = 90) {
        let repeatTimeout = null;
        let repeatInterval = null;

        function start(e) {
            e.preventDefault();
            action(); // تنفيذ فوري عند أول لمسة
            repeatTimeout = setTimeout(() => {
                repeatInterval = setInterval(action, interval);
            }, delay);
        }

        function stop() {
            clearTimeout(repeatTimeout);
            clearInterval(repeatInterval);
        }

        element.addEventListener('touchstart', start, { passive: false });
        element.addEventListener('touchend', stop);
        element.addEventListener('touchcancel', stop);
    }

    // ----- ربط الأزرار (JS) -----
    function initControls() {
        // === استخدام addHoldRepeat مع دمج الاهتزاز ===
        addHoldRepeat(document.getElementById('btnLeft'), () => { haptic('light'); moveLeft(); });
        addHoldRepeat(document.getElementById('btnRight'), () => { haptic('light'); moveRight(); });
        addHoldRepeat(document.getElementById('btnRotate'), () => { haptic('medium'); rotatePiece(); }, 999999);

        // === زر الخروج ===
        document.getElementById('exitBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            exitGame();
        });
    }

    // ----- بدء التشغيل -----
    function initGame() {
        nextPiece = randomPiece();
        spawnNewPiece();
        renderAll();
        initControls();
        currentSpeed = getSpeedForScore();
        startLoop();
    }

    initGame();
  })();
</script>
</body>
</html>
