<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dragon Duel Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#060a1a;
    --navy:#0d1638;
    --navy-panel:#121f4a;
    --blue-electric:#2fd0ff;
    --blue-glow:#4d8dff;
    --gold:#f2c14e;
    --gold-dim:#8a6d1f;
    --grass-1:#173a1f;
    --grass-2:#1f5227;
    --hp-green:#3ddc72;
    --hp-yellow:#f2c14e;
    --hp-red:#ff4d4d;
    --fire:#ff6a3d;
    --poison:#7ee081;
    --ice:#7fe3ff;
    --storm:#c68bff;
    --text-soft:#d8e2ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--navy-deep);overflow:hidden;font-family:'Inter',system-ui,sans-serif;}
  #app{
    position:relative;
    width:100vw;height:100vh;
    max-width:520px;margin:0 auto;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(79,141,255,0.16), transparent 60%),
      linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 60%);
    display:flex;flex-direction:column;
    color:var(--text-soft);
    overflow:hidden;
  }

  /* ---------- TOP BAR ---------- */
  #topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px 6px;
    z-index:20;
  }
  .player-tag{display:flex;flex-direction:column;gap:2px;}
  .player-name{font-family:'Cinzel',serif;font-weight:800;font-size:15px;letter-spacing:0.5px;color:var(--gold);text-shadow:0 0 12px rgba(242,193,78,0.4);}
  .trophy-row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-soft);opacity:0.85;}
  .trophy-row .icon{font-size:13px;}
  #timer{
    font-family:'Cinzel',serif;font-weight:700;font-size:17px;
    background:rgba(6,10,26,0.55);
    border:1px solid rgba(79,141,255,0.35);
    padding:5px 12px;border-radius:10px;
    box-shadow:0 0 14px rgba(47,208,255,0.15) inset;
    min-width:64px;text-align:center;
  }
  #timer.urgent{color:#ff8484;border-color:rgba(255,77,77,0.5);}

  /* ---------- BATTLEFIELD ---------- */
  #arena-frame{
    position:relative;flex:1;display:flex;align-items:stretch;
    margin:2px 8px 4px;gap:4px;
  }
  .tree-col{
    width:20px;flex-shrink:0;
    display:flex;flex-direction:column;justify-content:space-evenly;align-items:center;
    background:linear-gradient(180deg, #1a2f14, #12210e);
    border-radius:8px;
    font-size:13px;
    padding:6px 0;
    box-shadow:inset 0 0 8px rgba(0,0,0,0.5);
  }
  .tree-col span{filter:drop-shadow(0 2px 2px rgba(0,0,0,0.6));opacity:0.9;}
  .corner-torch{
    position:absolute;font-size:15px;z-index:25;
    filter:drop-shadow(0 0 6px rgba(255,150,50,0.8));
    animation:torchFlicker 1.6s ease-in-out infinite;
  }
  .corner-torch.tl{top:2px;left:24px;}
  .corner-torch.tr{top:2px;right:24px;}
  @keyframes torchFlicker{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.75;transform:scale(0.92);}
  }
  #field-wrap{
    position:relative;
    flex:1;
    border-radius:14px;
    overflow:hidden;
    border:3px solid #4a3826;
    background:repeating-linear-gradient(135deg,#5c4a34 0 8px,#4a3826 8px 16px);
    box-shadow:
      0 0 0 2px rgba(242,193,78,0.25),
      0 0 30px rgba(255,106,61,0.10) inset,
      0 8px 24px rgba(0,0,0,0.55);
  }
  #battlefield{
    position:absolute;inset:3px;border-radius:11px;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0 22px, transparent 22px 44px),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0 22px, transparent 22px 44px),
      radial-gradient(ellipse 60% 40% at 15% 8%, rgba(120,70,20,0.35), transparent 60%),
      radial-gradient(ellipse 55% 35% at 88% 6%, rgba(90,50,15,0.30), transparent 60%),
      radial-gradient(ellipse 70% 45% at 10% 92%, rgba(120,70,20,0.35), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 94%, rgba(90,50,15,0.30), transparent 60%),
      radial-gradient(circle at 22% 30%, rgba(255,106,61,0.10), transparent 22%),
      radial-gradient(circle at 78% 70%, rgba(255,106,61,0.10), transparent 22%),
      radial-gradient(circle at 65% 22%, rgba(0,0,0,0.18), transparent 18%),
      radial-gradient(circle at 30% 78%, rgba(0,0,0,0.18), transparent 18%),
      repeating-linear-gradient(115deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 26px),
      url('grass.webp') center/cover no-repeat;
  }
  #battlefield::before{
    content:'';
    position:absolute;inset:0;
    pointer-events:none;
    background:
      linear-gradient(18deg, transparent 47%, rgba(255,90,30,0.22) 49%, rgba(255,160,60,0.35) 50%, rgba(255,90,30,0.22) 51%, transparent 53%) no-repeat 8% 20% / 34% 3%,
      linear-gradient(-25deg, transparent 47%, rgba(255,90,30,0.18) 49%, rgba(255,160,60,0.3) 50%, rgba(255,90,30,0.18) 51%, transparent 53%) no-repeat 62% 14% / 26% 3%,
      linear-gradient(10deg, transparent 47%, rgba(255,90,30,0.18) 49%, rgba(255,160,60,0.3) 50%, rgba(255,90,30,0.18) 51%, transparent 53%) no-repeat 12% 78% / 30% 3%,
      linear-gradient(-14deg, transparent 47%, rgba(255,90,30,0.20) 49%, rgba(255,160,60,0.32) 50%, rgba(255,90,30,0.20) 51%, transparent 53%) no-repeat 58% 84% / 28% 3%;
    filter: blur(0.4px);
    box-shadow:
      0 0 8px 1px rgba(255,110,50,0.15) inset;
    mix-blend-mode: soft-light;
  }
  #battlefield::after{
    content:'';
    position:absolute;inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 10% 5% at 8% 15%, rgba(70,60,55,0.5), transparent 70%),
      radial-gradient(ellipse 8% 4% at 92% 10%, rgba(70,60,55,0.5), transparent 70%),
      radial-gradient(ellipse 9% 5% at 6% 88%, rgba(70,60,55,0.5), transparent 70%),
      radial-gradient(ellipse 8% 4% at 94% 90%, rgba(70,60,55,0.5), transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 50%, transparent 60%, rgba(0,0,0,0.28) 100%);
  }
  .lane-tint{
    position:absolute;top:0;bottom:0;width:2px;
    background:rgba(255,255,255,0.03);
  }
  #river{
    position:absolute;left:0;right:0;top:49%;height:5.5%;
    background:linear-gradient(180deg, rgba(79,141,255,0.55), rgba(47,208,255,0.35));
    box-shadow:0 0 18px rgba(47,208,255,0.5);
  }
  .bridge{
    position:absolute;top:47.5%;height:9%;width:15%;
    background:repeating-linear-gradient(90deg,#7a5a34 0 6px,#5f451f 6px 12px);
    border:1px solid #3d2c14;
    border-radius:2px;
  }
  .bridge.left{left:19%;}
  .bridge.right{left:66%;}

  .drop-zone{
    position:absolute;left:0;right:0;
    transition:background 0.15s;
  }
  .drop-zone.top{top:0;height:50%;}
  .drop-zone.bottom{bottom:0;height:50%;}
  .drop-zone.active-hint{background:rgba(242,193,78,0.10);}
  .lane-half{
    position:absolute;top:0;bottom:0;width:50%;
    pointer-events:none;
  }
  .lane-half.l{left:0;}
  .lane-half.r{left:50%;}
  .lane-half.hover-ok{background:rgba(47,208,255,0.14);}

  /* towers */
  .tower{
    position:absolute;
    display:flex;flex-direction:column;align-items:center;
    transform:translate(-50%,-50%);
    z-index:5;
  }
  .tower .icon{
    font-size:26px;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6));
  }
  .tower .icon img{
    width:26px;height:26px;
    object-fit:contain;
    display:block;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6));
  }
  .tower.king .icon{font-size:32px;}
  .tower .hpbar-wrap{
    width:46px;height:6px;border-radius:4px;
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(0,0,0,0.6);
    overflow:hidden;margin-top:3px;
  }
  .tower.king .hpbar-wrap{width:58px;}
  .tower .hpbar{height:100%;background:var(--hp-green);transition:width 0.25s;}
  .tower.destroyed{opacity:0.25;filter:grayscale(1);}
  .tower.destroyed .hpbar-wrap{display:none;}
  .tower .crown{position:absolute;top:-14px;font-size:11px;}

  /* units */
  .unit{
    position:absolute;
    transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;
    z-index:6;
    transition:left 0.1s linear, top 0.1s linear;
    pointer-events:none;
  }
  .unit .icon{font-size:22px;filter:drop-shadow(0 2px 5px rgba(0,0,0,0.6));}
  .unit.enemy .icon{transform:scaleY(-1);}
  .unit .hpbar-wrap{width:28px;height:4px;border-radius:3px;background:rgba(0,0,0,0.55);overflow:hidden;margin-top:2px;}
  .unit .hpbar{height:100%;transition:width 0.2s;}
  .unit.owner-player .hpbar{background:var(--blue-electric);}
  .unit.owner-enemy .hpbar{background:#ff7a7a;}

  .projectile{
    position:absolute;width:9px;height:9px;border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:7;pointer-events:none;
    box-shadow:0 0 10px currentColor, 0 0 4px currentColor;
  }
  .impact{
    position:absolute;width:26px;height:26px;border-radius:50%;
    transform:translate(-50%,-50%);
    z-index:8;pointer-events:none;
    background:radial-gradient(circle, rgba(255,255,255,0.9), transparent 70%);
    animation:impactPulse 0.28s ease-out forwards;
  }
  @keyframes impactPulse{
    0%{opacity:1;transform:translate(-50%,-50%) scale(0.3);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.6);}
  }

  #banner{
    position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);
    font-family:'Cinzel',serif;font-weight:800;font-size:15px;
    color:var(--gold);letter-spacing:2px;text-transform:uppercase;
    opacity:0;pointer-events:none;text-shadow:0 0 20px rgba(0,0,0,0.8);
    z-index:15;transition:opacity 0.3s;
  }
  #banner.show{opacity:1;}

  /* ---------- BOTTOM UI ---------- */
  #bottombar{
    position:relative;z-index:20;
    background:linear-gradient(180deg, #3a2717 0%, #26190d 100%);
    border-top:2px solid rgba(242,193,78,0.35);
    padding:8px 10px 10px;
  }
  #hand{
    display:flex;gap:7px;justify-content:center;margin-bottom:7px;
  }
  .card{
    position:relative;
    width:58px;height:74px;
    border-radius:9px;
    background:linear-gradient(160deg, var(--navy-panel), var(--navy));
    border:2px solid rgba(79,141,255,0.35);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .card .cicon{font-size:26px;}
  .card .cname{font-size:8px;margin-top:2px;color:var(--text-soft);opacity:0.8;text-align:center;line-height:1.1;}
  .card .ccost{
    position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#2a1c04;font-weight:700;font-size:11px;
    width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:2px solid #1a1204;
  }
  .card.selected{
    transform:translateY(-10px);
    border-color:var(--gold);
    box-shadow:0 0 16px rgba(242,193,78,0.55);
  }
  .card.disabled{opacity:0.4;filter:grayscale(0.6);cursor:not-allowed;}
  .card.next{width:44px;height:56px;opacity:0.55;cursor:default;transform:none !important;}
  .card.next .cicon{font-size:20px;}
  #next-label{font-size:8px;color:var(--text-soft);opacity:0.6;text-align:center;margin-top:-2px;}

  #elixir-row{display:flex;align-items:center;gap:8px;padding:0 4px;}
  #elixir-icon{font-size:16px;filter:drop-shadow(0 0 4px rgba(242,193,78,0.6));}
  #elixir-bar-wrap{
    flex:1;height:14px;border-radius:8px;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(242,193,78,0.3);
    overflow:hidden;position:relative;
  }
  #elixir-bar{
    height:100%;width:50%;
    background:linear-gradient(90deg, #b06fff, #7a3cff);
    box-shadow:0 0 10px rgba(122,60,255,0.6);
    transition:width 0.2s linear;
  }
  #elixir-count{font-size:12px;font-weight:700;min-width:38px;text-align:right;}

  /* ---------- OVERLAY ---------- */
  #overlay{
    position:absolute;inset:0;z-index:50;
    background:rgba(5,8,20,0.86);
    display:none;align-items:center;justify-content:center;flex-direction:column;
    text-align:center;padding:24px;
  }
  #overlay.show{display:flex;}
  #overlay h1{
    font-family:'Cinzel',serif;font-size:30px;margin:0 0 6px;
    letter-spacing:1px;
  }
  #overlay h1.win{color:var(--gold);text-shadow:0 0 24px rgba(242,193,78,0.6);}
  #overlay h1.lose{color:#ff7a7a;text-shadow:0 0 24px rgba(255,90,90,0.4);}
  #overlay p{color:var(--text-soft);opacity:0.8;font-size:13px;margin:0 0 20px;}
  #overlay button{
    font-family:'Cinzel',serif;font-weight:700;font-size:14px;
    background:linear-gradient(160deg, var(--gold), var(--gold-dim));
    color:#241a04;border:none;padding:12px 28px;border-radius:10px;
    cursor:pointer;letter-spacing:0.5px;
    box-shadow:0 4px 14px rgba(242,193,78,0.35);
  }
  #overlay button:active{transform:scale(0.97);}

  #hint{
    position:absolute;bottom:2px;left:0;right:0;text-align:center;
    font-size:10px;color:var(--text-soft);opacity:0.45;z-index:20;pointer-events:none;
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="player-tag">
      <div class="player-name">Dragon Master</div>
      <div class="trophy-row"><span class="icon">🏆</span><span id="trophyCount">5,200</span></div>
    </div>
    <div id="timer">2:30</div>
    <div class="player-tag" style="align-items:flex-end;">
      <div class="player-name" style="color:var(--blue-electric);">AI Rival</div>
      <div class="trophy-row"><span class="icon">🏆</span><span>4,980</span></div>
    </div>
  </div>

  <div id="arena-frame">
    <span class="corner-torch tl">🔥</span>
    <span class="corner-torch tr">🔥</span>
    <div class="tree-col left">
      <span>🌲</span><span>🌲</span><span>🪨</span><span>🌲</span><span>🌲</span>
    </div>
    <div id="field-wrap">
    <div id="battlefield">
      <div class="bridge left"></div>
      <div class="bridge right"></div>
      <div id="river"></div>

      <div class="drop-zone top" id="zoneTop"></div>
      <div class="drop-zone bottom" id="zoneBottom">
        <div class="lane-half l" id="halfL"></div>
        <div class="lane-half r" id="halfR"></div>
      </div>

      <!-- towers injected by JS -->
      <div id="towersLayer"></div>
      <div id="unitsLayer"></div>
      <div id="fxLayer"></div>

      <div id="banner">Double Elixir!</div>
    </div>
    </div>
    <div class="tree-col right">
      <span>🌲</span><span>🪨</span><span>🌲</span><span>🌲</span><span>🌲</span>
    </div>
  </div>

  <div id="bottombar">
    <div id="hand">
      <!-- 4 cards injected -->
    </div>
    <div id="elixir-row">
      <span id="elixir-icon">💠</span>
      <div id="elixir-bar-wrap"><div id="elixir-bar"></div></div>
      <span id="elixir-count">5/10</span>
      <div style="display:flex;flex-direction:column;align-items:center;margin-left:6px;">
        <div class="card next" id="nextCard"><span class="cicon"></span></div>
        <span id="next-label">NEXT</span>
      </div>
    </div>
  </div>

  <div id="hint">اضغط على كرت ثم اضغط على نصفك من الملعب لوضعه</div>

  <div id="overlay">
    <h1 id="resultTitle">النصر!</h1>
    <p id="resultSub">دمرت أبراج الخصم أكتر منه</p>
    <button id="playAgainBtn">العب مرة ثانية</button>
  </div>

</div>

<script>
(function(){

/* ===================== CONFIG ===================== */
const CARD_DB = {
  red:    { key:'red',    name:'تنين النار',  icon:'🔴', dragonIcon:'🐲', cost:4, hp:340, dmg:42, atkSpeed:1100, range:19, speed:0.11, color:'#ff6a3d', proj:'#ff6a3d', splash:false, dot:true },
  green:  { key:'green',  name:'تنين السم',   icon:'🟢', dragonIcon:'🐉', cost:3, hp:230, dmg:24, atkSpeed:800,  range:15, speed:0.15, color:'#7ee081', proj:'#7ee081', splash:false, dot:false },
  ice:    { key:'ice',    name:'تنين الجليد', icon:'🔵', dragonIcon:'🐋', cost:4, hp:300, dmg:28, atkSpeed:1400, range:22, speed:0.09, color:'#7fe3ff', proj:'#7fe3ff', splash:false, slow:true },
  purple: { key:'purple', name:'تنين العاصفة',icon:'🟣', dragonIcon:'🦇', cost:5, hp:430, dmg:58, atkSpeed:1700, range:17, speed:0.075,color:'#c68bff', proj:'#c68bff', splash:true, dot:false },
  potion: { key:'potion', name:'جرعة الشفاء', icon:'🧪', cost:4, heal:180 }
};
const DECK_ORDER = ['red','green','ice','purple','potion'];
const MATCH_SECONDS = 150; // 2:30
const TICK_MS = 100;

/* ===================== STATE ===================== */
let state = null;
let tickTimer = null;
let aiTimer = null;
let idCounter = 1;

function freshTowerSet(){
  return {
    left:  { hp:1400, maxHp:1400, destroyed:false },
    right: { hp:1400, maxHp:1400, destroyed:false },
    king:  { hp:2400, maxHp:2400, destroyed:false }
  };
}

function buildDeckQueue(){
  // infinite shuffled-ish cycle so both hand+next always have a card
  let q = [];
  for(let i=0;i<3;i++){
    let batch = [...DECK_ORDER];
    for(let j=batch.length-1;j>0;j--){
      const k = Math.floor(Math.random()*(j+1));
      [batch[j],batch[k]] = [batch[k],batch[j]];
    }
    q = q.concat(batch);
  }
  return q;
}

function initState(){
  const pQueue = buildDeckQueue();
  const eQueue = buildDeckQueue();
  state = {
    time: MATCH_SECONDS,
    over: false,
    doubleElixirShown:false,
    playerElixir: 5,
    enemyElixir: 5,
    playerHand: pQueue.splice(0,4),
    playerNext: pQueue.shift(),
    playerQueue: pQueue,
    enemyHand: eQueue.splice(0,4),
    enemyNext: eQueue.shift(),
    enemyQueue: eQueue,
    selectedCardIdx: null,
    towers: { player: freshTowerSet(), enemy: freshTowerSet() },
    units: [],
    projectiles: []
  };
}

/* ===================== DOM refs ===================== */
const handEl = document.getElementById('hand');
const nextCardEl = document.getElementById('nextCard');
const elixirBar = document.getElementById('elixir-bar');
const elixirCount = document.getElementById('elixir-count');
const timerEl = document.getElementById('timer');
const towersLayer = document.getElementById('towersLayer');
const unitsLayer = document.getElementById('unitsLayer');
const fxLayer = document.getElementById('fxLayer');
const halfL = document.getElementById('halfL');
const halfR = document.getElementById('halfR');
const banner = document.getElementById('banner');
const overlay = document.getElementById('overlay');
const resultTitle = document.getElementById('resultTitle');
const resultSub = document.getElementById('resultSub');

/* Tower layout (percent coordinates within battlefield) */
const TOWER_POS = {
  enemy: { left:{x:25,y:12}, king:{x:50,y:5}, right:{x:75,y:12} },
  player:{ left:{x:25,y:88}, king:{x:50,y:95}, right:{x:75,y:88} }
};
const LANE_X = { left:25, right:75 };

/* ===================== TOWER ICON HELPER ===================== */
function getTowerIcon(side, pos){
  if(pos === 'king') return '🏯';
  if(side === 'enemy' && pos === 'left')  return '<img src="enemy-tower-left.webp" alt="enemy tower left">';
  if(side === 'enemy' && pos === 'right') return '<img src="enemy-tower-right.webp" alt="enemy tower right">';
  return '🗼';
}

/* ===================== RENDER: static towers ===================== */
function renderTowers(){
  towersLayer.innerHTML = '';
  ['enemy','player'].forEach(side=>{
    ['left','right','king'].forEach(pos=>{
      const t = state.towers[side][pos];
      const coord = TOWER_POS[side][pos];
      const div = document.createElement('div');
      div.className = 'tower' + (pos==='king'?' king':'') + (t.destroyed?' destroyed':'');
      div.id = `tower-${side}-${pos}`;
      div.style.left = coord.x+'%';
      div.style.top = coord.y+'%';
      div.innerHTML = `
        ${pos==='king' && side==='player' ? '<div class="crown">👑</div>':''}
        <div class="icon">${getTowerIcon(side,pos)}</div>
        <div class="hpbar-wrap"><div class="hpbar" style="width:${(t.hp/t.maxHp*100)}%"></div></div>
      `;
      towersLayer.appendChild(div);
    });
  });
}

function updateTowerDOM(side,pos){
  const t = state.towers[side][pos];
  const div = document.getElementById(`tower-${side}-${pos}`);
  if(!div) return;
  const bar = div.querySelector('.hpbar');
  bar.style.width = Math.max(0,(t.hp/t.maxHp*100))+'%';
  if(t.destroyed) div.classList.add('destroyed');
}

/* ===================== HAND UI ===================== */
function renderHand(){
  handEl.innerHTML = '';
  state.playerHand.forEach((cardKey, idx)=>{
    const card = CARD_DB[cardKey];
    const affordable = state.playerElixir >= card.cost;
    const div = document.createElement('div');
    div.className = 'card' + (idx===state.selectedCardIdx?' selected':'') + (affordable?'':' disabled');
    div.innerHTML = `<span class="cicon">${card.dragonIcon || card.icon}</span><span class="cname">${card.name}</span><span class="ccost">${card.cost}</span>`;
    div.addEventListener('click', ()=> selectCard(idx));
    handEl.appendChild(div);
  });
  const nCard = CARD_DB[state.playerNext];
  nextCardEl.innerHTML = `<span class="cicon">${nCard.dragonIcon || nCard.icon}</span>`;
}

function selectCard(idx){
  if(state.over) return;
  const cardKey = state.playerHand[idx];
  const card = CARD_DB[cardKey];
  if(state.playerElixir < card.cost) return;
  state.selectedCardIdx = (state.selectedCardIdx === idx) ? null : idx;
  renderHand();
  highlightDropZone();
}

function highlightDropZone(){
  const active = state.selectedCardIdx !== null;
  halfL.classList.toggle('hover-ok', active);
  halfR.classList.toggle('hover-ok', active);
}

/* click on own half to place */
function handleFieldClick(e){
  if(state.over || state.selectedCardIdx === null) return;
  const rect = document.getElementById('battlefield').getBoundingClientRect();
  const clickX = ((e.clientX - rect.left) / rect.width) * 100;
  const clickY = ((e.clientY - rect.top) / rect.height) * 100;
  if(clickY < 50) return; // must be on player's own half
  const lane = clickX < 50 ? 'left' : 'right';
  playCard('player', state.selectedCardIdx, lane, clickY);
}
document.getElementById('battlefield').addEventListener('click', handleFieldClick);

/* ===================== GAMEPLAY: playing cards ===================== */
function playCard(owner, handIdx, lane, spawnY){
  const hand = owner==='player' ? state.playerHand : state.enemyHand;
  const cardKey = hand[handIdx];
  const card = CARD_DB[cardKey];
  const elixirKey = owner==='player' ? 'playerElixir' : 'enemyElixir';
  if(state[elixirKey] < card.cost) return;

  state[elixirKey] -= card.cost;

  if(cardKey === 'potion'){
    applyPotion(owner);
  } else {
    spawnUnit(owner, cardKey, lane, spawnY);
  }

  // cycle hand: consumed card -> becomes 'next', pull new next from queue
  const nextKey = owner==='player' ? 'playerNext' : 'enemyNext';
  const queueKey = owner==='player' ? 'playerQueue' : 'enemyQueue';
  hand[handIdx] = state[nextKey];
  if(state[queueKey].length === 0){
    state[queueKey] = buildDeckQueue();
  }
  state[nextKey] = state[queueKey].shift();

  if(owner==='player'){
    state.selectedCardIdx = null;
    renderHand();
    highlightDropZone();
  }
}

function applyPotion(owner){
  const towers = state.towers[owner];
  // heal the most damaged (non-destroyed) tower
  let target = null;
  ['left','right','king'].forEach(pos=>{
    const t = towers[pos];
    if(t.destroyed) return;
    if(!target || (t.hp/t.maxHp) < (target.hp/target.maxHp)) target = t;
  });
  if(target){
    target.hp = Math.min(target.maxHp, target.hp + CARD_DB.potion.heal);
    const posKey = Object.keys(towers).find(k=>towers[k]===target);
    updateTowerDOM(owner, posKey);
    spawnHealFx(owner, posKey);
  }
}

function spawnHealFx(owner, posKey){
  const coord = TOWER_POS[owner][posKey];
  const div = document.createElement('div');
  div.className = 'impact';
  div.style.left = coord.x+'%';
  div.style.top = coord.y+'%';
  div.style.background = 'radial-gradient(circle, rgba(125,255,150,0.9), transparent 70%)';
  fxLayer.appendChild(div);
  setTimeout(()=>div.remove(), 300);
}

function spawnUnit(owner, cardKey, lane, spawnY){
  const card = CARD_DB[cardKey];
  const y = spawnY != null ? spawnY : (owner==='player' ? 82 : 18);
  const unit = {
    id: idCounter++,
    owner, cardKey, lane,
    x: LANE_X[lane],
    y,
    hp: card.hp, maxHp: card.hp,
    cooldown: 0,
    slowedUntil: 0,
    el: null
  };
  state.units.push(unit);
  const div = document.createElement('div');
  div.className = `unit owner-${owner} ${owner==='enemy'?'enemy':''}`;
  div.innerHTML = `<span class="icon">${card.dragonIcon}</span><div class="hpbar-wrap"><div class="hpbar" style="width:100%"></div></div>`;
  div.style.left = unit.x+'%';
  div.style.top = unit.y+'%';
  unitsLayer.appendChild(div);
  unit.el = div;
}

/* ===================== AI OPPONENT ===================== */
function aiTick(){
  if(state.over) return;
  // try to play cheapest affordable card occasionally
  const affordableIdx = state.enemyHand
    .map((k,i)=>({i,cost:CARD_DB[k].cost}))
    .filter(c=>state.enemyElixir >= c.cost);
  if(affordableIdx.length === 0) return;
  if(Math.random() < 0.55){
    const choice = affordableIdx[Math.floor(Math.random()*affordableIdx.length)];
    const lane = Math.random() < 0.5 ? 'left' : 'right';
    playCard('enemy', choice.i, lane, 18);
  }
}

/* ===================== GAME LOOP ===================== */
function gameTick(){
  if(state.over) return;

  // timer
  state.time -= TICK_MS/1000;
  if(state.time <= 0){
    state.time = 0;
    endMatch(decideWinnerByDamage());
  }
  renderTimer();

  // double elixir in final 60s
  const doubleElixir = state.time <= 60;
  if(doubleElixir && !state.doubleElixirShown){
    state.doubleElixirShown = true;
    showBanner('Double Elixir!');
  }
  const regenRate = (doubleElixir ? 2 : 1) * (TICK_MS/2800);
  state.playerElixir = Math.min(10, state.playerElixir + regenRate);
  state.enemyElixir = Math.min(10, state.enemyElixir + regenRate);
  renderElixir();
  renderHandAffordability();

  updateUnits();
  updateProjectiles();

  if(!state.over) checkWinByTowers();
}

function renderTimer(){
  const t = Math.ceil(state.time);
  const m = Math.floor(t/60);
  const s = String(t%60).padStart(2,'0');
  timerEl.textContent = `${m}:${s}`;
  timerEl.classList.toggle('urgent', t <= 30);
}

function renderElixir(){
  elixirBar.style.width = (state.playerElixir/10*100)+'%';
  elixirCount.textContent = `${Math.floor(state.playerElixir)}/10`;
}
function renderHandAffordability(){
  [...handEl.children].forEach((div,idx)=>{
    const cardKey = state.playerHand[idx];
    const affordable = state.playerElixir >= CARD_DB[cardKey].cost;
    div.classList.toggle('disabled', !affordable);
  });
}

function showBanner(text){
  banner.textContent = text;
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), 2200);
}

/* ---- unit movement + combat ---- */
function updateUnits(){
  const alive = [];
  for(const u of state.units){
    if(u.hp <= 0){
      u.el.remove();
      continue;
    }
    alive.push(u);
  }
  state.units = alive;

  for(const u of state.units){
    const card = CARD_DB[u.cardKey];
    const forward = u.owner === 'player' ? -1 : 1; // player moves up (y decreases), enemy moves down
    const opponents = state.units.filter(o => o.owner !== u.owner && o.lane === u.lane && o.hp > 0);

    // find nearest opponent unit in range
    let target = null, targetDist = Infinity;
    for(const o of opponents){
      const d = Math.abs(o.y - u.y);
      if(d < targetDist){ targetDist = d; target = o; }
    }

    let acting = false;
    if(target && targetDist <= card.range){
      acting = true;
      tryAttack(u, target, 'unit');
    } else {
      // check tower in this lane
      const towerSide = u.owner === 'player' ? 'enemy' : 'player';
      const laneTowerAlive = !state.towers[towerSide][u.lane].destroyed;
      const towerPos = towerSide === 'enemy' ? TOWER_POS.enemy[u.lane] : TOWER_POS.player[u.lane];
      let towerKeyToHit = u.lane;
      let tCoord = towerPos;
      if(!laneTowerAlive){
        towerKeyToHit = 'king';
        tCoord = TOWER_POS[towerSide].king;
      }
      const towerObj = state.towers[towerSide][towerKeyToHit];
      if(towerObj && !towerObj.destroyed){
        const d = Math.abs(tCoord.y - u.y);
        if(d <= card.range){
          acting = true;
          tryAttack(u, { isTower:true, side:towerSide, key:towerKeyToHit, x:tCoord.x, y:tCoord.y }, 'tower');
        }
      }
    }

    if(!acting){
      let speed = card.speed;
      if(u.slowedUntil > performance.now()) speed *= 0.5;
      u.y += forward * speed * (TICK_MS/100);
      u.y = Math.max(4, Math.min(96, u.y));
      u.el.style.top = u.y+'%';
    }
    if(u.cooldown > 0) u.cooldown -= TICK_MS;
  }

  // refresh hp bars
  for(const u of state.units){
    const bar = u.el.querySelector('.hpbar');
    bar.style.width = Math.max(0, u.hp/u.maxHp*100)+'%';
  }
}

function tryAttack(unit, target, kind){
  if(unit.cooldown > 0) return;
  const card = CARD_DB[unit.cardKey];
  unit.cooldown = card.atkSpeed;
  const fromX = unit.x, fromY = unit.y;
  const toX = kind==='unit' ? target.x : target.x;
  const toY = kind==='unit' ? target.y : target.y;
  spawnProjectile(fromX, fromY, toX, toY, card, unit.owner, target, kind);
}

function spawnProjectile(x1,y1,x2,y2,card,owner,target,kind){
  const id = idCounter++;
  const el = document.createElement('div');
  el.className = 'projectile';
  el.style.left = x1+'%'; el.style.top = y1+'%';
  el.style.background = card.proj;
  el.style.color = card.proj;
  fxLayer.appendChild(el);
  state.projectiles.push({
    id, el, x1,y1,x2,y2, t:0, duration: 320,
    dmg: card.dmg, splash: card.splash, slow: card.slow, dot: card.dot,
    owner, target, kind, lane: null
  });
}

function updateProjectiles(){
  const remaining = [];
  for(const p of state.projectiles){
    p.t += TICK_MS;
    const progress = Math.min(1, p.t / p.duration);
    const x = p.x1 + (p.x2-p.x1)*progress;
    const y = p.y1 + (p.y2-p.y1)*progress;
    p.el.style.left = x+'%';
    p.el.style.top = y+'%';
    if(progress >= 1){
      resolveHit(p);
      p.el.remove();
    } else {
      remaining.push(p);
    }
  }
  state.projectiles = remaining;
}

function resolveHit(p){
  spawnImpact(p.x2, p.y2, p.owner);
  if(p.kind === 'unit'){
    if(p.target.hp > 0){
      p.target.hp -= p.dmg;
      if(p.slow) p.target.slowedUntil = performance.now() + 1500;
      if(p.splash){
        // hit any other opponent unit adjacent in same lane
        const others = state.units.filter(o => o.owner !== p.owner && o.lane === p.target.lane && o !== p.target && Math.abs(o.y - p.target.y) < 8);
        others.forEach(o => o.hp -= Math.round(p.dmg*0.5));
      }
    }
  } else if(p.kind === 'tower'){
    const t = state.towers[p.target.side][p.target.key];
    if(!t.destroyed){
      t.hp -= p.dmg;
      if(t.hp <= 0){
        t.hp = 0;
        t.destroyed = true;
      }
      updateTowerDOM(p.target.side, p.target.key);
    }
  }
}

function spawnImpact(x,y,owner){
  const div = document.createElement('div');
  div.className = 'impact';
  div.style.left = x+'%';
  div.style.top = y+'%';
  fxLayer.appendChild(div);
  setTimeout(()=>div.remove(), 300);
}

/* ===================== WIN CONDITIONS ===================== */
function checkWinByTowers(){
  if(state.towers.enemy.king.destroyed){
    endMatch('player');
  } else if(state.towers.player.king.destroyed){
    endMatch('enemy');
  }
}

function decideWinnerByDamage(){
  const towersLeftPlayer = countStanding('player');
  const towersLeftEnemy = countStanding('enemy');
  if(towersLeftPlayer > towersLeftEnemy) return 'player';
  if(towersLeftEnemy > towersLeftPlayer) return 'enemy';
  // tiebreak: compare remaining total hp
  const hpPlayer = sumHp('player');
  const hpEnemy = sumHp('enemy');
  if(hpPlayer === hpEnemy) return 'draw';
  return hpPlayer > hpEnemy ? 'player' : 'enemy';
}
function countStanding(side){
  const t = state.towers[side];
  return ['left','right','king'].filter(k=>!t[k].destroyed).length;
}
function sumHp(side){
  const t = state.towers[side];
  return t.left.hp + t.right.hp + t.king.hp;
}

function endMatch(winner){
  if(state.over) return;
  state.over = true;
  clearInterval(tickTimer);
  clearInterval(aiTimer);
  overlay.classList.add('show');
  if(winner === 'player'){
    resultTitle.textContent = 'النصر! 🏆';
    resultTitle.className = 'win';
    resultSub.textContent = 'دمرت أبراج الخصم وفزت بالمبارزة';
  } else if(winner === 'enemy'){
    resultTitle.textContent = 'هزيمة';
    resultTitle.className = 'lose';
    resultSub.textContent = 'دمر الخصم أبراجك... حاول مرة ثانية';
  } else {
    resultTitle.textContent = 'تعادل';
    resultTitle.className = 'win';
    resultSub.textContent = 'كلا الطرفين تعادلا في الأبراج والضرر';
  }
}

/* ===================== INIT / RESET ===================== */
function startGame(){
  overlay.classList.remove('show');
  unitsLayer.innerHTML = '';
  fxLayer.innerHTML = '';
  initState();
  renderTowers();
  renderHand();
  renderElixir();
  renderTimer();
  highlightDropZone();
  tickTimer = setInterval(gameTick, TICK_MS);
  aiTimer = setInterval(aiTick, 1400);
}

document.getElementById('playAgainBtn').addEventListener('click', startGame);

startGame();
})();
</script>
