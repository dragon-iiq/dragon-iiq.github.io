<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong · سرعة متزايدة بعد 25 ثانية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            padding: 10px;
        }

        .game-wrapper {
            background: #141a2b;
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            width: 100%;
            max-width: 820px;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 800/500;
            border-radius: 1.8rem;
            background: #0b111f;
            box-shadow: inset 0 0 60px rgba(0, 20, 60, 0.6), 0 10px 20px rgba(0, 0, 0, 0.5);
            touch-action: none;
            cursor: default;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            color: #a0bbf0;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 0 0.3rem;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .score {
            display: flex;
            gap: 2rem;
            background: #101826;
            padding: 0.3rem 1.5rem;
            border-radius: 3rem;
            border: 1px solid #2c3a5a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .score span {
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 2rem;
            text-align: center;
            color: #d6e6ff;
        }

        .score .player-label { color: #6d9eff; }
        .score .ai-label { color: #ff7b9c; }

        .timer-badge {
            background: #1a2540;
            padding: 0.2rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid #3a507a;
            font-size: 0.9rem;
            color: #8aafe0;
            min-width: 100px;
            text-align: center;
        }

        .timer-badge span {
            color: #f0e68c;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #1f2a42;
            border: none;
            color: #b6ceff;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.35rem 1.5rem;
            border-radius: 3rem;
            border: 1px solid #3e4f74;
            box-shadow: 0 4px 0 #0a0f1a;
            transition: all 0.08s linear;
            cursor: pointer;
            letter-spacing: 0.3px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #0a0f1a;
        }

        .btn-primary {
            background: #2a4a7a;
            border-color: #5a8ad0;
            color: #eaf3ff;
            box-shadow: 0 4px 0 #122238;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #122238;
        }

        .btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            box-shadow: 0 4px 0 #0a0f1a;
            cursor: default;
        }

        .btn-success {
            background: #1f6d3a;
            border-color: #3aad5a;
            color: #d4ffd4;
            box-shadow: 0 4px 0 #0d2e1a;
        }

        .btn-success:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #0d2e1a;
        }

        .touch-hint {
            display: flex;
            gap: 0.5rem;
            color: #5a6f96;
            font-size: 0.8rem;
            align-items: center;
        }

        .touch-hint span {
            background: #1a2338;
            padding: 0.1rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid #2f405f;
        }

        @media (max-width: 600px) {
            .game-wrapper { padding: 0.8rem; border-radius: 1.8rem; }
            .score { gap: 1rem; padding: 0.2rem 1rem; }
            .score span { font-size: 1.1rem; min-width: 1.5rem; }
            .btn { font-size: 0.8rem; padding: 0.25rem 1rem; }
            .timer-badge { font-size: 0.75rem; min-width: 70px; padding: 0.15rem 0.8rem; }
            .touch-hint { display: none; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="pongCanvas" width="800" height="500"></canvas>
        <div class="status-bar">
            <div class="score">
                <span class="player-label">👤 <span id="playerScore">0</span></span>
                <span class="ai-label">🤖 <span id="aiScore">0</span></span>
            </div>
            <div class="timer-badge" id="timerBadge">
                ⏱ <span id="timerDisplay">0</span> ث
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="startAIbtn">▶ اللعب مع AI</button>
                <button class="btn btn-success" id="resetBtn">↻ إعادة</button>
            </div>
            <div class="touch-hint">
                <span>👆 اسحب على الشاشة</span>
            </div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            const canvas = document.getElementById('pongCanvas');
            const ctx = canvas.getContext('2d');
            const playerScoreEl = document.getElementById('playerScore');
            const aiScoreEl = document.getElementById('aiScore');
            const startAIbtn = document.getElementById('startAIbtn');
            const resetBtn = document.getElementById('resetBtn');
            const timerDisplay = document.getElementById('timerDisplay');

            const CANVAS_W = 800, CANVAS_H = 500;

            const BALL_SIZE = 12;
            const BALL_SPEED_INIT = 4.2;
            const BALL_MAX_SPEED = 11.5;
            const BALL_ACCEL_PER_SECOND = 0.045; // زيادة تدريجية لكل ثانية بعد 25 ثانية

            const PADDLE_W = 14;
            const PADDLE_H = 90;
            const PADDLE_SPEED = 6.0;
            const AI_SPEED = 4.2;

            const TOP_WALL = 10;
            const BOTTOM_WALL = CANVAS_H - 10;
            const WIN_SCORE = 10;
            const SPEED_UP_DELAY = 25; // 25 ثانية

            // حالة اللعبة
            let playerY = (CANVAS_H - PADDLE_H) / 2;
            let aiY = (CANVAS_H - PADDLE_H) / 2;

            let ball = {
                x: CANVAS_W/2,
                y: CANVAS_H/2,
                vx: 0,
                vy: 0,
                size: BALL_SIZE,
                speed: BALL_SPEED_INIT
            };

            let playerScore = 0;
            let aiScore = 0;

            let gameActive = true;
            let gamePaused = true;
            let aiEnabled = false;
            let gameOver = false;
            let winnerMessage = '';

            // التحكم باللمس
            let touchY = null;
            let touchActive = false;

            // متغيرات السرعة والوقت
            let gameTime = 0;          // الوقت بالثواني منذ بدء المباراة
            let speedMultiplier = 1.0;
            let lastTimestamp = 0;
            let isSpeedUpActive = false;

            // ---- دوال مساعدة ----
            function getCurrentSpeed() {
                // السرعة الأساسية + الزيادة التدريجية بعد 25 ثانية
                let baseSpeed = BALL_SPEED_INIT;
                if (gameTime > SPEED_UP_DELAY) {
                    const extra = (gameTime - SPEED_UP_DELAY) * BALL_ACCEL_PER_SECOND;
                    return Math.min(baseSpeed + extra, BALL_MAX_SPEED);
                }
                return baseSpeed;
            }

            function applySpeedToBall() {
                const currentSpeed = getCurrentSpeed();
                const currentAngle = Math.atan2(ball.vy, ball.vx);
                ball.vx = currentSpeed * Math.cos(currentAngle);
                ball.vy = currentSpeed * Math.sin(currentAngle);
                // الحفاظ على الاتجاه
                if (Math.abs(ball.vx) < 0.5) ball.vx = currentSpeed * (ball.vx >= 0 ? 1 : -1);
            }

            function resetBall(direction) {
                ball.x = CANVAS_W/2;
                ball.y = CANVAS_H/2 + (Math.random() * 60 - 30);
                const angle = (Math.random() * 0.8 + 0.2) * (Math.random() > 0.5 ? 1 : -1);
                const speed = getCurrentSpeed();
                ball.vx = speed * (direction || (Math.random() > 0.5 ? 1 : -1));
                ball.vy = angle * 2.2;
                if (Math.abs(ball.vy) < 0.8) ball.vy = 0.8 * (ball.vy > 0 ? 1 : -1);
                ball.speed = speed;
            }

            function fullReset() {
                playerY = (CANVAS_H - PADDLE_H) / 2;
                aiY = (CANVAS_H - PADDLE_H) / 2;
                playerScore = 0;
                aiScore = 0;
                gameOver = false;
                winnerMessage = '';
                gameTime = 0;
                speedMultiplier = 1.0;
                isSpeedUpActive = false;
                timerDisplay.textContent = '0';

                playerScoreEl.textContent = '0';
                aiScoreEl.textContent = '0';

                const speed = getCurrentSpeed();
                ball.vx = speed;
                ball.vy = 1.8;
                ball.x = CANVAS_W/2;
                ball.y = CANVAS_H/2;
                ball.speed = speed;

                gameActive = true;
                gamePaused = true;

                if (aiEnabled) {
                    aiEnabled = false;
                    startAIbtn.disabled = false;
                    startAIbtn.textContent = '▶ اللعب مع AI';
                    startAIbtn.style.opacity = '1';
                    startAIbtn.style.cursor = 'pointer';
                }

                touchY = null;
                touchActive = false;
                lastTimestamp = 0;
            }

            function startAI() {
                if (gameOver) {
                    fullReset();
                }
                aiEnabled = true;
                gamePaused = false;
                gameActive = true;
                gameOver = false;
                winnerMessage = '';
                gameTime = 0;
                timerDisplay.textContent = '0';
                lastTimestamp = performance.now();

                const speed = getCurrentSpeed();
                if (ball.vx === 0 && ball.vy === 0) {
                    resetBall(1);
                } else {
                    applySpeedToBall();
                }

                startAIbtn.textContent = '⚡ AI مفعل';
                startAIbtn.disabled = true;
                startAIbtn.style.opacity = '0.7';
                startAIbtn.style.cursor = 'default';
            }

            function checkWinCondition() {
                if (playerScore >= WIN_SCORE) {
                    gameOver = true;
                    gameActive = false;
                    gamePaused = true;
                    winnerMessage = '🎉 فزت!';
                    return true;
                } else if (aiScore >= WIN_SCORE) {
                    gameOver = true;
                    gameActive = false;
                    gamePaused = true;
                    winnerMessage = '😞 خسرت!';
                    return true;
                }
                return false;
            }

            function scorePoint(winner) {
                if (gameOver) return;

                if (winner === 'player') {
                    playerScore++;
                    playerScoreEl.textContent = playerScore;
                    if (!checkWinCondition()) {
                        resetBall(-1);
                    }
                } else {
                    aiScore++;
                    aiScoreEl.textContent = aiScore;
                    if (!checkWinCondition()) {
                        resetBall(1);
                    }
                }

                if (!gameOver) {
                    gameActive = true;
                    if (!aiEnabled) {
                        gamePaused = true;
                        ball.vx = 0;
                        ball.vy = 0;
                    } else {
                        gamePaused = false;
                    }
                } else {
                    ball.vx = 0;
                    ball.vy = 0;
                    gamePaused = true;
                    gameActive = false;
                }
            }

            // ---- تحديث الفيزياء ----
            function update(timestamp) {
                if (!gameActive || gamePaused || gameOver) return;

                // تحديث الوقت
                if (lastTimestamp === 0) lastTimestamp = timestamp;
                const delta = (timestamp - lastTimestamp) / 1000; // بالثواني
                lastTimestamp = timestamp;

                if (delta > 0 && delta < 0.1) {
                    gameTime += delta;
                    timerDisplay.textContent = Math.floor(gameTime);

                    // تحديث السرعة تدريجياً
                    if (gameTime > SPEED_UP_DELAY) {
                        isSpeedUpActive = true;
                        applySpeedToBall();
                    }
                }

                // 1. تحريك مضرب اللاعب
                if (touchActive && touchY !== null) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleY = CANVAS_H / rect.height;
                    const canvasY = (touchY - rect.top) * scaleY;
                    let targetY = canvasY - PADDLE_H/2;
                    targetY = Math.max(TOP_WALL, Math.min(targetY, BOTTOM_WALL - PADDLE_H));
                    playerY = targetY;
                }

                // 2. الذكاء الاصطناعي
                if (aiEnabled) {
                    const aiCenter = aiY + PADDLE_H/2;
                    const ballCenter = ball.y + ball.size/2;
                    if (ball.vx > 0 && ball.x > CANVAS_W/2 - 40) {
                        if (aiCenter < ballCenter - 8 && aiY + PADDLE_H < BOTTOM_WALL) {
                            aiY += AI_SPEED * 0.95;
                        } else if (aiCenter > ballCenter + 8 && aiY > TOP_WALL) {
                            aiY -= AI_SPEED * 0.95;
                        }
                    } else if (ball.vx < 0 && ball.x < CANVAS_W/2 + 40) {
                        const targetY = (CANVAS_H - PADDLE_H) / 2;
                        if (Math.abs(aiCenter - targetY) > 20) {
                            if (aiCenter < targetY && aiY + PADDLE_H < BOTTOM_WALL) aiY += AI_SPEED * 0.3;
                            else if (aiCenter > targetY && aiY > TOP_WALL) aiY -= AI_SPEED * 0.3;
                        }
                    } else {
                        const targetY = (CANVAS_H - PADDLE_H) / 2;
                        if (Math.abs(aiCenter - targetY) > 40) {
                            if (aiCenter < targetY && aiY + PADDLE_H < BOTTOM_WALL) aiY += AI_SPEED * 0.2;
                            else if (aiCenter > targetY && aiY > TOP_WALL) aiY -= AI_SPEED * 0.2;
                        }
                    }
                    aiY = Math.max(TOP_WALL, Math.min(aiY, BOTTOM_WALL - PADDLE_H));
                }

                // 3. حركة الكرة
                ball.x += ball.vx;
                ball.y += ball.vy;

                // التصادم مع الجدران
                if (ball.y <= TOP_WALL) {
                    ball.y = TOP_WALL;
                    ball.vy = -ball.vy;
                } else if (ball.y + ball.size >= BOTTOM_WALL) {
                    ball.y = BOTTOM_WALL - ball.size;
                    ball.vy = -ball.vy;
                }

                // التصادم مع المضارب
                const playerRect = { x: 20, y: playerY, w: PADDLE_W, h: PADDLE_H };
                const aiRect = { x: CANVAS_W - 20 - PADDLE_W, y: aiY, w: PADDLE_W, h: PADDLE_H };
                const ballRect = { x: ball.x, y: ball.y, w: ball.size, h: ball.size };

                function rectCollide(r1, r2) {
                    return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                           r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
                }

                // تصادم اللاعب
                if (rectCollide(ballRect, playerRect) && ball.vx < 0) {
                    const relativeY = (ball.y + ball.size/2) - (playerY + PADDLE_H/2);
                    const normalized = relativeY / (PADDLE_H/2);
                    const angle = normalized * 1.2;
                    const currentSpeed = getCurrentSpeed();
                    const speed = Math.min(currentSpeed + 0.2, BALL_MAX_SPEED);
                    ball.vx = speed * Math.cos(angle);
                    ball.vy = speed * Math.sin(angle);
                    if (ball.vx < 0) ball.vx = -ball.vx;
                    if (Math.abs(ball.vy) < 0.5) ball.vy = 0.8 * (ball.vy >= 0 ? 1 : -1);
                    ball.x = playerRect.x + playerRect.w + 1;
                }

                // تصادم الذكاء
                if (aiEnabled && rectCollide(ballRect, aiRect) && ball.vx > 0) {
                    const relativeY = (ball.y + ball.size/2) - (aiY + PADDLE_H/2);
                    const normalized = relativeY / (PADDLE_H/2);
                    const angle = normalized * 1.2;
                    const currentSpeed = getCurrentSpeed();
                    const speed = Math.min(currentSpeed + 0.2, BALL_MAX_SPEED);
                    ball.vx = -speed * Math.cos(angle);
                    ball.vy = speed * Math.sin(angle);
                    if (ball.vx > 0) ball.vx = -ball.vx;
                    if (Math.abs(ball.vy) < 0.5) ball.vy = 0.8 * (ball.vy >= 0 ? 1 : -1);
                    ball.x = aiRect.x - ball.size - 1;
                }

                // تسجيل الأهداف
                if (!gameOver) {
                    if (ball.x + ball.size < 0) {
                        scorePoint('ai');
                    } else if (ball.x > CANVAS_W) {
                        scorePoint('player');
                    }
                }

                // حماية
                if (ball.x < -20) ball.x = 20;
                if (ball.x > CANVAS_W + 20) ball.x = CANVAS_W - 20;
                if (ball.y < TOP_WALL) ball.y = TOP_WALL;
                if (ball.y + ball.size > BOTTOM_WALL) ball.y = BOTTOM_WALL - ball.size;
            }

            // ---- الرسم ----
            function draw() {
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

                ctx.shadowColor = 'rgba(60, 130, 255, 0.15)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.strokeStyle = '#2e3d60';
                ctx.lineWidth = 2;
                ctx.setLineDash([18, 22]);
                ctx.moveTo(CANVAS_W/2, 10);
                ctx.lineTo(CANVAS_W/2, CANVAS_H-10);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.beginPath();
                ctx.strokeStyle = '#263454';
                ctx.lineWidth = 2.5;
                ctx.arc(CANVAS_W/2, CANVAS_H/2, 70, 0, Math.PI*2);
                ctx.stroke();

                // مضارب
                ctx.shadowBlur = 28;
                ctx.shadowColor = 'rgba(70, 150, 255, 0.6)';
                ctx.fillStyle = '#4b8cff';
                ctx.shadowColor = 'rgba(70, 150, 255, 0.7)';
                ctx.beginPath();
                ctx.roundRect(20, playerY, PADDLE_W, PADDLE_H, 6);
                ctx.fill();

                ctx.fillStyle = '#ff5f87';
                ctx.shadowColor = 'rgba(255, 100, 150, 0.7)';
                ctx.beginPath();
                ctx.roundRect(CANVAS_W - 20 - PADDLE_W, aiY, PADDLE_W, PADDLE_H, 6);
                ctx.fill();

                // الكرة
                ctx.shadowBlur = 45;
                ctx.shadowColor = '#9bc0ff';
                ctx.fillStyle = '#e6f0ff';
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2, ball.y + ball.size/2, ball.size/2, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 80;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2 - 2, ball.y + ball.size/2 - 2, ball.size/3, 0, Math.PI*2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // مؤشر زيادة السرعة
                if (isSpeedUpActive && !gameOver && !gamePaused) {
                    ctx.font = '16px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#f0e68c';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(255, 200, 50, 0.3)';
                    const speedPercent = Math.round(((getCurrentSpeed() - BALL_SPEED_INIT) / (BALL_MAX_SPEED - BALL_SPEED_INIT)) * 100);
                    ctx.fillText(`⚡ سرعة ${speedPercent}%`, CANVAS_W/2, 40);
                    ctx.shadowBlur = 0;
                }

                // رسالة الانتظار
                if (gamePaused && !aiEnabled && !gameOver) {
                    ctx.font = 'bold 28px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(180, 210, 255, 0.9)';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = 'rgba(70, 150, 255, 0.5)';
                    ctx.fillText('👆 اضغط "اللعب مع AI"', CANVAS_W/2, CANVAS_H/2 + 80);
                    ctx.shadowBlur = 0;
                }

                // رسالة الفوز / الخسارة
                if (gameOver && winnerMessage) {
                    ctx.shadowBlur = 50;
                    ctx.shadowColor = 'rgba(255, 200, 50, 0.6)';
                    ctx.font = 'bold 64px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.roundRect(CANVAS_W/2 - 180, CANVAS_H/2 - 70, 360, 140, 30);
                    ctx.fill();

                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
                    ctx.fillStyle = winnerMessage.includes('فزت') ? '#7dffb3' : '#ff7b8a';
                    ctx.fillText(winnerMessage, CANVAS_W/2, CANVAS_H/2 - 8);

                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(100, 150, 255, 0.3)';
                    ctx.font = '20px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#aac0f0';
                    ctx.fillText('اضغط "إعادة" للعب مجدداً', CANVAS_W/2, CANVAS_H/2 + 70);

                    ctx.shadowBlur = 0;
                    ctx.textBaseline = 'alphabetic';
                }
            }

            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            // ---- حلقة اللعبة ----
            function gameLoop(timestamp) {
                update(timestamp);
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ---- أحداث اللمس ----
            function handleTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    touchY = touch.clientY;
                    touchActive = true;
                }
            }

            function handleTouchMove(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    touchY = touch.clientY;
                    touchActive = true;
                }
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                touchActive = false;
                touchY = null;
            }

            function handleTouchCancel(e) {
                e.preventDefault();
                touchActive = false;
                touchY = null;
            }

            function preventMouse(e) {
                e.preventDefault();
            }

            // ---- أزرار ----
            resetBtn.addEventListener('click', function() {
                fullReset();
                if (gameOver) {
                    gameOver = false;
                    winnerMessage = '';
                    startAIbtn.disabled = false;
                    startAIbtn.textContent = '▶ اللعب مع AI';
                    startAIbtn.style.opacity = '1';
                    startAIbtn.style.cursor = 'pointer';
                    aiEnabled = false;
                }
                isSpeedUpActive = false;
                timerDisplay.textContent = '0';
            });

            startAIbtn.addEventListener('click', function() {
                if (gameOver) {
                    fullReset();
                }
                if (!aiEnabled) {
                    startAI();
                }
            });

            // ---- تهيئة ----
            gameActive = true;
            gamePaused = true;
            aiEnabled = false;
            gameOver = false;
            winnerMessage = '';
            gameTime = 0;
            isSpeedUpActive = false;
            timerDisplay.textContent = '0';

            ball.vx = 0;
            ball.vy = 0;
            ball.x = CANVAS_W/2;
            ball.y = CANVAS_H/2;
            playerScore = 0;
            aiScore = 0;
            playerScoreEl.textContent = '0';
            aiScoreEl.textContent = '0';

            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });

            canvas.addEventListener('mousedown', preventMouse);
            canvas.addEventListener('mousemove', preventMouse);
            canvas.addEventListener('mouseup', preventMouse);
            canvas.addEventListener('click', preventMouse);

            requestAnimationFrame(gameLoop);

            window.addEventListener('unload', function() {
                canvas.removeEventListener('touchstart', handleTouchStart);
                canvas.removeEventListener('touchmove', handleTouchMove);
                canvas.removeEventListener('touchend', handleTouchEnd);
                canvas.removeEventListener('touchcancel', handleTouchCancel);
            });

        })();
    </script>
</body>
</html>
