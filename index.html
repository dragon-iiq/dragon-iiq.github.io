<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong عمودي · لمس فقط · 200%</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            padding: 10px;
        }

        .game-wrapper {
            background: #141a2b;
            padding: 1rem 1.2rem 1.2rem 1.2rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.2rem 0.5rem 0.6rem 0.5rem;
            color: #a0bbf0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .score-header .score {
            display: flex;
            gap: 2rem;
            background: #101826;
            padding: 0.2rem 1.5rem;
            border-radius: 3rem;
            border: 1px solid #2c3a5a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .score-header .score span {
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 2rem;
            text-align: center;
            color: #d6e6ff;
        }

        .score-header .score .player-label { color: #6d9eff; }
        .score-header .score .ai-label { color: #ff7b9c; }

        .ai-icon {
            width: 1.3em;
            height: 1.3em;
            vertical-align: -0.25em;
        }

        .score-header .timer-badge {
            background: #1a2540;
            padding: 0.15rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid #3a507a;
            font-size: 0.75rem;
            color: #8aafe0;
            text-align: center;
        }

        .score-header .timer-badge span {
            color: #f0e68c;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .btn {
            background: #1f2a42;
            border: none;
            color: #b6ceff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.9rem;
            border-radius: 3rem;
            border: 1px solid #3e4f74;
            box-shadow: 0 3px 0 #0a0f1a;
            transition: all 0.08s linear;
            cursor: pointer;
            letter-spacing: 0.3px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0a0f1a;
        }

        .btn-primary {
            background: #2a4a7a;
            border-color: #5a8ad0;
            color: #eaf3ff;
            box-shadow: 0 3px 0 #122238;
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #122238;
        }

        .btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            box-shadow: 0 3px 0 #0a0f1a;
            cursor: default;
        }

        .btn-success {
            background: #1f6d3a;
            border-color: #3aad5a;
            color: #d4ffd4;
            box-shadow: 0 3px 0 #0d2e1a;
        }

        .btn-success:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0d2e1a;
        }

        .btn-sound {
            background: #2a2a42;
            border-color: #4f4f74;
            color: #cfcfff;
            box-shadow: 0 3px 0 #16162a;
        }

        .btn-sound:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #16162a;
        }

        .btn-sound.muted {
            opacity: 0.5;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 400/700;
            border-radius: 1.8rem;
            background: #0b111f;
            box-shadow: inset 0 0 60px rgba(0, 20, 60, 0.6), 0 10px 20px rgba(0, 0, 0, 0.5);
            touch-action: none;
            cursor: default;
        }

        .touch-hint {
            display: flex;
            gap: 0.3rem;
            color: #5a6f96;
            font-size: 0.7rem;
            align-items: center;
            justify-content: center;
            padding-top: 0.5rem;
        }

        .touch-hint span {
            background: #1a2338;
            padding: 0.05rem 0.6rem;
            border-radius: 2rem;
            border: 1px solid #2f405f;
        }

        @media (max-width: 450px) {
            .game-wrapper { padding: 0.6rem; border-radius: 1.5rem; max-width: 100%; }
            .score-header .score { gap: 1rem; padding: 0.15rem 0.8rem; }
            .score-header .score span { font-size: 1.1rem; min-width: 1.5rem; }
            .btn { font-size: 0.65rem; padding: 0.15rem 0.6rem; }
            .timer-badge { font-size: 0.6rem; padding: 0.1rem 0.5rem; }
            .touch-hint { display: none; }
        }
    </style>
</head>

        <canvas id="pongCanvas" width="400" height="700"></canvas>

        <div class="touch-hint">
            <span>👆 اسحب على الشاشة للتحكم</span>
        </div>

    <script>
        (function(){
            "use strict";

            const canvas = document.getElementById('pongCanvas');
            const ctx = canvas.getContext('2d');
            const playerScoreEl = document.getElementById('playerScore');
            const aiScoreEl = document.getElementById('aiScore');

            const CANVAS_W = 400;
            const CANVAS_H = 700;

            const BALL_SIZE = 14;
            const BALL_SPEED_INIT = 15;
            const BALL_MAX_SPEED = 30;
            const BALL_ACCEL_PER_SECOND = 0.10;

            const PADDLE_W = 90;
            const PADDLE_H = 14;
            const PADDLE_SPEED = 5.5;
            const AI_SPEED = 3.8;

            const LEFT_WALL = 10;
            const RIGHT_WALL = CANVAS_W - 10;
            const TOP_WALL = 10;
            const BOTTOM_WALL = CANVAS_H - 10;

            const WIN_SCORE = 10;
            const SPEED_UP_DELAY = 10;
            const SPEED_UP_JUMP_MULTIPLIER = 1.5;

            // ---------- نظام الصوت (Web Audio API - بدون ملفات خارجية) ----------
            let audioCtx = null;
            let soundEnabled = true;

            function ensureAudioCtx() {
                if (!audioCtx) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContextClass();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            }

            function playTone(freq, duration, type, startGain, delay) {
                if (!soundEnabled) return;
                try {
                    const ac = ensureAudioCtx();
                    const osc = ac.createOscillator();
                    const gainNode = ac.createGain();
                    osc.type = type || 'sine';
                    osc.frequency.setValueAtTime(freq, ac.currentTime + (delay || 0));
                    gainNode.gain.setValueAtTime(0.0001, ac.currentTime + (delay || 0));
                    gainNode.gain.exponentialRampToValueAtTime(startGain || 0.25, ac.currentTime + (delay || 0) + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + (delay || 0) + duration);
                    osc.connect(gainNode);
                    gainNode.connect(ac.destination);
                    osc.start(ac.currentTime + (delay || 0));
                    osc.stop(ac.currentTime + (delay || 0) + duration + 0.02);
                } catch (e) {
                    // تجاهل أي مشكلة صوتية بدون كسر اللعبة
                }
            }

            function playPaddleHitSound() {
                playTone(180, 0.09, 'sine', 0.22);
                playTone(90, 0.07, 'sine', 0.12, 0.005);
            }

            function playWallBounceSound() {
                playTone(660, 0.05, 'sine', 0.12);
            }

            function playScoreSound(winner) {
                if (winner === 'player') {
                    playTone(523, 0.06, 'square', 0.2, 0);
                    playTone(659, 0.06, 'square', 0.2, 0.06);
                    playTone(784, 0.06, 'square', 0.2, 0.12);
                    playTone(1047, 0.12, 'square', 0.2, 0.18);
                } else {
                    playTone(392, 0.08, 'square', 0.2, 0);
                    playTone(330, 0.08, 'square', 0.2, 0.08);
                    playTone(262, 0.08, 'square', 0.2, 0.16);
                    playTone(196, 0.16, 'square', 0.2, 0.24);
                }
            }

            function playWinSound() {
                [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.18, 'triangle', 0.22, i * 0.11));
            }

            function playLoseSound() {
                playTone(392, 0.35, 'sine', 0.2, 0);
                playTone(370, 0.35, 'sine', 0.2, 0.35);
                playTone(349, 0.35, 'sine', 0.2, 0.7);
                playTone(262, 0.7, 'sine', 0.22, 1.05);
            }

            // ---------------------------------------------------------------------

            let playerX = (CANVAS_W - PADDLE_W) / 2;
            let aiX = (CANVAS_W - PADDLE_W) / 2;

            // ---------- خلفية نجوم/synthwave ----------
            const STAR_COUNT = 90;
            const stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * CANVAS_W,
                    y: Math.random() * CANVAS_H,
                    r: Math.random() * 1.4 + 0.4,
                    baseAlpha: Math.random() * 0.5 + 0.25,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 1.2 + 0.4
                });
            }

            function drawBackground(timestamp) {
                const bgGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
                bgGrad.addColorStop(0, '#060812');
                bgGrad.addColorStop(0.55, '#0a0e1f');
                bgGrad.addColorStop(1, '#1a0f28');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                const glowGrad = ctx.createRadialGradient(
                    CANVAS_W/2, CANVAS_H/2, 10,
                    CANVAS_W/2, CANVAS_H/2, 320
                );
                glowGrad.addColorStop(0, 'rgba(200, 80, 220, 0.16)');
                glowGrad.addColorStop(0.5, 'rgba(120, 60, 180, 0.07)');
                glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = glowGrad;
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                const t = (timestamp || 0) / 1000;
                for (let i = 0; i < stars.length; i++) {
                    const s = stars[i];
                    const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
                    ctx.globalAlpha = s.baseAlpha * (0.5 + 0.5 * twinkle);
                    ctx.fillStyle = '#dce8ff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
            // ---------------------------------------------------------

            let ball = {
                x: CANVAS_W/2,
                y: CANVAS_H/2,
                vx: 0,
                vy: 0,
                size: BALL_SIZE
            };

            let playerScore = 0;
            let aiScore = 0;

            let gameActive = true;
            let gamePaused = true;
            let aiEnabled = false;
            let gameOver = false;
            let winnerMessage = '';

            let touchX = null;
            let touchActive = false;

            let gameTime = 0;
            let lastTimestamp = 0;
            let isSpeedUpActive = false;

            function getCurrentSpeed() {
                let baseSpeed = BALL_SPEED_INIT;
                if (gameTime > SPEED_UP_DELAY) {
                    const jumpSpeed = baseSpeed * SPEED_UP_JUMP_MULTIPLIER;
                    const extra = (gameTime - SPEED_UP_DELAY) * BALL_ACCEL_PER_SECOND;
                    return Math.min(jumpSpeed + extra, BALL_MAX_SPEED);
                }
                return baseSpeed;
            }

            function getSpeedPercent() {
                const current = getCurrentSpeed();
                return Math.round(((current - BALL_SPEED_INIT) / (BALL_MAX_SPEED - BALL_SPEED_INIT)) * 100);
            }

            function applySpeedToBall() {
                const currentSpeed = getCurrentSpeed();
                const currentAngle = Math.atan2(ball.vy, ball.vx);
                ball.vx = currentSpeed * Math.cos(currentAngle);
                ball.vy = currentSpeed * Math.sin(currentAngle);
                if (Math.abs(ball.vx) < 0.5) ball.vx = currentSpeed * (ball.vx >= 0 ? 1 : -1);
                if (Math.abs(ball.vy) < 0.5) ball.vy = currentSpeed * (ball.vy >= 0 ? 1 : -1);
            }

            function resetBall(direction) {
                ball.x = CANVAS_W/2 + (Math.random() * 60 - 30);
                ball.y = CANVAS_H/2;
                const angle = (Math.random() * 0.8 + 0.2) * (Math.random() > 0.5 ? 1 : -1);
                const speed = getCurrentSpeed();
                ball.vx = angle * 1.8;
                ball.vy = speed * (direction || (Math.random() > 0.5 ? 1 : -1));
                if (Math.abs(ball.vx) < 0.8) ball.vx = 0.8 * (ball.vx >= 0 ? 1 : -1);
                if (Math.abs(ball.vy) < 0.8) ball.vy = 0.8 * (ball.vy >= 0 ? 1 : -1);
            }

            function fullReset() {
                playerX = (CANVAS_W - PADDLE_W) / 2;
                aiX = (CANVAS_W - PADDLE_W) / 2;
                playerScore = 0;
                aiScore = 0;
                gameOver = false;
                winnerMessage = '';
                gameTime = 0;
                isSpeedUpActive = false;

                playerScoreEl.textContent = '0';
                aiScoreEl.textContent = '0';

                ball.x = CANVAS_W/2;
                ball.y = CANVAS_H/2;
                ball.vx = 0;
                ball.vy = 0;

                gameActive = true;
                gamePaused = true;
                aiEnabled = false;

                touchX = null;
                touchActive = false;
                lastTimestamp = 0;
            }

            function startAI() {
                ensureAudioCtx();
                aiEnabled = true;
                gamePaused = false;
                gameActive = true;
                gameOver = false;
                winnerMessage = '';
                gameTime = 0;
                lastTimestamp = performance.now();

                if (ball.vx === 0 && ball.vy === 0) {
                    resetBall(1);
                } else {
                    applySpeedToBall();
                }
            }

            // ---------- عد تنازلي تلقائي عند فتح اللعبة / بعد كل جولة ----------
            let countdownActive = false;
            let countdownValue = 0;

            function runCountdownThenStart() {
                gamePaused = true;
                gameActive = false;
                countdownActive = true;
                countdownValue = 1;
                playTone(440, 0.08, 'sine', 0.15, 0);

                setTimeout(() => {
                    countdownValue = 2;
                    playTone(440, 0.08, 'sine', 0.15, 0);
                }, 700);

                setTimeout(() => {
                    countdownValue = 3;
                    playTone(440, 0.08, 'sine', 0.15, 0);
                }, 1400);

                setTimeout(() => {
                    countdownActive = false;
                    startAI();
                }, 2100);
            }
            // ---------------------------------------------------------------------

            function checkWinCondition() {
                if (playerScore >= WIN_SCORE) {
                    gameOver = true;
                    gameActive = false;
                    gamePaused = true;
                    winnerMessage = '🎉 فزت!';
                    playWinSound();
                    setTimeout(() => {
                        fullReset();
                        runCountdownThenStart();
                    }, 2600);
                    return true;
                } else if (aiScore >= WIN_SCORE) {
                    gameOver = true;
                    gameActive = false;
                    gamePaused = true;
                    winnerMessage = '😞 خسرت!';
                    playLoseSound();
                    setTimeout(() => {
                        fullReset();
                        runCountdownThenStart();
                    }, 2600);
                    return true;
                }
                return false;
            }

            function scorePoint(winner) {
                if (gameOver) return;

                playScoreSound(winner);

                if (winner === 'player') {
                    playerScore++;
                    playerScoreEl.textContent = playerScore;
                    if (!checkWinCondition()) {
                        resetBall(-1);
                    }
                } else {
                    aiScore++;
                    aiScoreEl.textContent = aiScore;
                    if (!checkWinCondition()) {
                        resetBall(1);
                    }
                }

                if (!gameOver) {
                    gameActive = true;
                    if (!aiEnabled) {
                        gamePaused = true;
                        ball.vx = 0;
                        ball.vy = 0;
                    } else {
                        gamePaused = false;
                    }
                } else {
                    ball.vx = 0;
                    ball.vy = 0;
                    gamePaused = true;
                    gameActive = false;
                }
            }

            function update(timestamp) {
                if (!gameActive || gamePaused || gameOver) return;

                if (lastTimestamp === 0) lastTimestamp = timestamp;
                const delta = (timestamp - lastTimestamp) / 1000;
                lastTimestamp = timestamp;

                if (delta > 0 && delta < 0.1) {
                    gameTime += delta;
                    if (gameTime > SPEED_UP_DELAY) {
                        isSpeedUpActive = true;
                        applySpeedToBall();
                    }
                }

                if (touchActive && touchX !== null) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = CANVAS_W / rect.width;
                    const canvasX = (touchX - rect.left) * scaleX;
                    let targetX = canvasX - PADDLE_W/2;
                    targetX = Math.max(LEFT_WALL, Math.min(targetX, RIGHT_WALL - PADDLE_W));
                    playerX = targetX;
                }

                if (aiEnabled) {
                    const aiCenter = aiX + PADDLE_W/2;
                    const ballCenter = ball.x + ball.size/2;
                    if (ball.vy < 0 && ball.y < CANVAS_H/2 + 30) {
                        if (aiCenter < ballCenter - 6 && aiX + PADDLE_W < RIGHT_WALL) {
                            aiX += AI_SPEED * 0.95;
                        } else if (aiCenter > ballCenter + 6 && aiX > LEFT_WALL) {
                            aiX -= AI_SPEED * 0.95;
                        }
                    } else if (ball.vy > 0 && ball.y > CANVAS_H/2 - 30) {
                        const targetX = (CANVAS_W - PADDLE_W) / 2;
                        if (Math.abs(aiCenter - targetX) > 30) {
                            if (aiCenter < targetX && aiX + PADDLE_W < RIGHT_WALL) aiX += AI_SPEED * 0.25;
                            else if (aiCenter > targetX && aiX > LEFT_WALL) aiX -= AI_SPEED * 0.25;
                        }
                    } else {
                        const targetX = (CANVAS_W - PADDLE_W) / 2;
                        if (Math.abs(aiCenter - targetX) > 40) {
                            if (aiCenter < targetX && aiX + PADDLE_W < RIGHT_WALL) aiX += AI_SPEED * 0.2;
                            else if (aiCenter > targetX && aiX > LEFT_WALL) aiX -= AI_SPEED * 0.2;
                        }
                    }
                    aiX = Math.max(LEFT_WALL, Math.min(aiX, RIGHT_WALL - PADDLE_W));
                }

                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.x <= LEFT_WALL) {
                    ball.x = LEFT_WALL;
                    ball.vx = -ball.vx;
                    playWallBounceSound();
                } else if (ball.x + ball.size >= RIGHT_WALL) {
                    ball.x = RIGHT_WALL - ball.size;
                    ball.vx = -ball.vx;
                    playWallBounceSound();
                }

                const playerRect = { x: playerX, y: BOTTOM_WALL - PADDLE_H, w: PADDLE_W, h: PADDLE_H };
                const aiRect = { x: aiX, y: TOP_WALL, w: PADDLE_W, h: PADDLE_H };
                const ballRect = { x: ball.x, y: ball.y, w: ball.size, h: ball.size };

                function rectCollide(r1, r2) {
                    return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                           r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
                }

                if (rectCollide(ballRect, playerRect) && ball.vy > 0) {
                    const relativeX = (ball.x + ball.size/2) - (playerX + PADDLE_W/2);
                    const normalized = relativeX / (PADDLE_W/2);
                    const angle = normalized * 1.2;
                    const currentSpeed = getCurrentSpeed();
                    const speed = Math.min(currentSpeed + 0.2, BALL_MAX_SPEED);
                    ball.vx = speed * Math.sin(angle);
                    ball.vy = -speed * Math.cos(angle);
                    if (ball.vy > 0) ball.vy = -ball.vy;
                    if (Math.abs(ball.vx) < 0.5) ball.vx = 0.8 * (ball.vx >= 0 ? 1 : -1);
                    ball.y = playerRect.y - ball.size - 1;
                    playPaddleHitSound();
                }

                if (aiEnabled && rectCollide(ballRect, aiRect) && ball.vy < 0) {
                    const relativeX = (ball.x + ball.size/2) - (aiX + PADDLE_W/2);
                    const normalized = relativeX / (PADDLE_W/2);
                    const angle = normalized * 1.2;
                    const currentSpeed = getCurrentSpeed();
                    const speed = Math.min(currentSpeed + 0.2, BALL_MAX_SPEED);
                    ball.vx = speed * Math.sin(angle);
                    ball.vy = speed * Math.cos(angle);
                    if (ball.vy < 0) ball.vy = -ball.vy;
                    if (Math.abs(ball.vx) < 0.5) ball.vx = 0.8 * (ball.vx >= 0 ? 1 : -1);
                    ball.y = aiRect.y + aiRect.h + 1;
                    playPaddleHitSound();
                }

                if (!gameOver) {
                    if (ball.y + ball.size > CANVAS_H + 10) {
                        scorePoint('ai');
                    } else if (ball.y < -10) {
                        scorePoint('player');
                    }
                }

                if (ball.x < LEFT_WALL) ball.x = LEFT_WALL;
                if (ball.x + ball.size > RIGHT_WALL) ball.x = RIGHT_WALL - ball.size;
                if (ball.y < -20) ball.y = 20;
                if (ball.y + ball.size > CANVAS_H + 20) ball.y = CANVAS_H - ball.size - 20;
            }

            function draw(timestamp) {
                drawBackground(timestamp);

                ctx.shadowColor = 'rgba(230, 90, 220, 0.55)';
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(220, 110, 230, 0.55)';
                ctx.lineWidth = 2;
                ctx.setLineDash([18, 22]);
                ctx.moveTo(10, CANVAS_H/2);
                ctx.lineTo(CANVAS_W - 10, CANVAS_H/2);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.shadowBlur = 18;
                ctx.shadowColor = 'rgba(180, 100, 255, 0.5)';
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(190, 120, 255, 0.6)';
                ctx.lineWidth = 2.5;
                ctx.arc(CANVAS_W/2, CANVAS_H/2, 60, 0, Math.PI*2);
                ctx.stroke();

                ctx.shadowBlur = 28;
                ctx.shadowColor = 'rgba(70, 150, 255, 0.6)';
                ctx.fillStyle = '#4b8cff';
                ctx.shadowColor = 'rgba(70, 150, 255, 0.7)';
                ctx.beginPath();
                ctx.roundRect(playerX, BOTTOM_WALL - PADDLE_H, PADDLE_W, PADDLE_H, 6);
                ctx.fill();

                ctx.fillStyle = '#ff5f87';
                ctx.shadowColor = 'rgba(255, 100, 150, 0.7)';
                ctx.beginPath();
                ctx.roundRect(aiX, TOP_WALL, PADDLE_W, PADDLE_H, 6);
                ctx.fill();

                ctx.shadowBlur = 45;
                ctx.shadowColor = '#9bc0ff';
                ctx.fillStyle = '#e6f0ff';
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2, ball.y + ball.size/2, ball.size/2, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 80;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2 - 2, ball.y + ball.size/2 - 2, ball.size/3, 0, Math.PI*2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                if (countdownActive && countdownValue > 0) {
                    ctx.font = 'bold 90px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#e6d6ff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(200, 120, 255, 0.7)';
                    ctx.fillText(String(countdownValue), CANVAS_W/2, CANVAS_H/2);
                    ctx.shadowBlur = 0;
                    ctx.textBaseline = 'alphabetic';
                }

                if (gameOver && winnerMessage) {
                    ctx.shadowBlur = 50;
                    ctx.shadowColor = 'rgba(255, 200, 50, 0.6)';
                    ctx.font = 'bold 56px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.roundRect(CANVAS_W/2 - 150, CANVAS_H/2 - 60, 300, 120, 30);
                    ctx.fill();

                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
                    ctx.fillStyle = winnerMessage.includes('فزت') ? '#7dffb3' : '#ff7b8a';
                    ctx.fillText(winnerMessage, CANVAS_W/2, CANVAS_H/2 - 6);

                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(100, 150, 255, 0.3)';
                    ctx.font = '16px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#aac0f0';
                    ctx.fillText('الجولة القادمة تبدأ تلقائياً...', CANVAS_W/2, CANVAS_H/2 + 60);

                    ctx.shadowBlur = 0;
                    ctx.textBaseline = 'alphabetic';
                }
            }

            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            function gameLoop(timestamp) {
                update(timestamp);
                draw(timestamp);
                requestAnimationFrame(gameLoop);
            }

            // ---- أحداث اللمس فقط (بدون ماوس) ----
            function handleTouchStart(e) {
                e.preventDefault();
                ensureAudioCtx();
                const touch = e.touches[0];
                if (touch) {
                    touchX = touch.clientX;
                    touchActive = true;
                }
            }

            function handleTouchMove(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    touchX = touch.clientX;
                    touchActive = true;
                }
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                touchActive = false;
                touchX = null;
            }

            function handleTouchCancel(e) {
                e.preventDefault();
                touchActive = false;
                touchX = null;
            }

            // ---- تهيئة ----
            gameActive = true;
            gamePaused = true;
            aiEnabled = false;
            gameOver = false;
            winnerMessage = '';
            gameTime = 0;
            isSpeedUpActive = false;

            ball.vx = 0;
            ball.vy = 0;
            ball.x = CANVAS_W/2;
            ball.y = CANVAS_H/2;
            playerScore = 0;
            aiScore = 0;
            playerScoreEl.textContent = '0';
            aiScoreEl.textContent = '0';

            // ربط أحداث اللمس فقط
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });

            requestAnimationFrame(gameLoop);
            runCountdownThenStart();

            window.addEventListener('unload', function() {
                canvas.removeEventListener('touchstart', handleTouchStart);
                canvas.removeEventListener('touchmove', handleTouchMove);
                canvas.removeEventListener('touchend', handleTouchEnd);
                canvas.removeEventListener('touchcancel', handleTouchCancel);
            });

        })();
    </script>
</body>
</html>
