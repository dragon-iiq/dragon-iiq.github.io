<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong عمودي · سرعة متزايدة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            padding: 10px;
        }

        .game-wrapper {
            background: #141a2b;
            padding: 1rem 1.2rem 1.2rem 1.2rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            width: 100%;
            max-width: 500px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 400/700;
            border-radius: 1.8rem;
            background: #0b111f;
            box-shadow: inset 0 0 60px rgba(0, 20, 60, 0.6), 0 10px 20px rgba(0, 0, 0, 0.5);
            touch-action: none;
            cursor: default;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            color: #a0bbf0;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 0 0.2rem;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .score {
            display: flex;
            gap: 1.5rem;
            background: #101826;
            padding: 0.2rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid #2c3a5a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        .score span {
            font-size: 1.2rem;
            font-weight: 700;
            min-width: 1.8rem;
            text-align: center;
            color: #d6e6ff;
        }

        .score .player-label { color: #6d9eff; }
        .score .ai-label { color: #ff7b9c; }

        .timer-badge {
            background: #1a2540;
            padding: 0.15rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid #3a507a;
            font-size: 0.75rem;
            color: #8aafe0;
            text-align: center;
        }

        .timer-badge span {
            color: #f0e68c;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #1f2a42;
            border: none;
            color: #b6ceff;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.25rem 1rem;
            border-radius: 3rem;
            border: 1px solid #3e4f74;
            box-shadow: 0 3px 0 #0a0f1a;
            transition: all 0.08s linear;
            cursor: pointer;
            letter-spacing: 0.3px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0a0f1a;
        }

        .btn-primary {
            background: #2a4a7a;
            border-color: #5a8ad0;
            color: #eaf3ff;
            box-shadow: 0 3px 0 #122238;
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #122238;
        }

        .btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            box-shadow: 0 3px 0 #0a0f1a;
            cursor: default;
        }

        .btn-success {
            background: #1f6d3a;
            border-color: #3aad5a;
            color: #d4ffd4;
            box-shadow: 0 3px 0 #0d2e1a;
        }

        .btn-success:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0d2e1a;
        }

        .touch-hint {
            display: flex;
            gap: 0.3rem;
            color: #5a6f96;
            font-size: 0.7rem;
            align-items: center;
        }

        .touch-hint span {
            background: #1a2338;
            padding: 0.05rem 0.6rem;
            border-radius: 2rem;
            border: 1px solid #2f405f;
        }

        @media (max-width: 450px) {
            .game-wrapper { padding: 0.6rem; border-radius: 1.5rem; max-width: 100%; }
            .score { gap: 0.8rem; padding: 0.15rem 0.8rem; }
            .score span { font-size: 1rem; min-width: 1.2rem; }
            .btn { font-size: 0.7rem; padding: 0.2rem 0.7rem; }
            .timer-badge { font-size: 0.65rem; padding: 0.1rem 0.6rem; }
            .touch-hint { display: none; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="pongCanvas" width="400" height="700"></canvas>
        <div class="status-bar">
            <div class="score">
                <span class="player-label">👤 <span id="playerScore">0</span></span>
                <span class="ai-label">🤖 <span id="aiScore">0</span></span>
            </div>
            <div class="timer-badge">
                ⏱ <span id="timerDisplay">0</span>ث
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="startAIbtn">▶ AI</button>
                <button class="btn btn-success" id="resetBtn">↻</button>
            </div>
            <div class="touch-hint">
                <span>👆 اسحب</span>
            </div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            const canvas = document.getElementById('pongCanvas');
            const ctx = canvas.getContext('2d');
            const playerScoreEl = document.getElementById('playerScore');
            const aiScoreEl = document.getElementById('aiScore');
            const startAIbtn = document.getElementById('startAIbtn');
            const resetBtn = document.getElementById('resetBtn');
            const timerDisplay = document.getElementById('timerDisplay');

            // أبعاد عمودية (طولية)
            const CANVAS_W = 400;
            const CANVAS_H = 700;

            // الكرة
            const BALL_SIZE = 14;
            const BALL_SPEED_INIT = 3.8;
            const BALL_MAX_SPEED = 10.0;
            const BALL_ACCEL_PER_SECOND = 0.04;

            // المضارب (أفقية الآن لأن اللعبة طولية)
            const PADDLE_W = 90;      // عرض المضرب (أفقي)
            const PADDLE_H = 14;      // ارتفاع المضرب
            const PADDLE_SPEED = 5.5;
            const AI_SPEED = 3.8;

            // الحدود
            const LEFT_WALL = 10;
            const RIGHT_WALL = CANVAS_W - 10;
            const TOP_WALL = 10;
            const BOTTOM_WALL = CANVAS_H - 10;

            const WIN_SCORE = 10;
            const SPEED_UP_DELAY = 25;

            // حالة اللعبة
            // المضارب تتحرك يمين/يسار (محور X)
            let playerX = (CANVAS_W - PADDLE_W) / 2;
            let aiX = (CANVAS_W - PADDLE_W) / 2;

            let ball = {
                x: CANVAS_W/2,
                y: CANVAS_H/2,
                vx: 0,
                vy: 0,
                size: BALL_SIZE
            };

            let playerScore = 0;
            let aiScore = 0;

            let gameActive = true;
            let gamePaused = true;
            let aiEnabled = false;
            let gameOver = false;
            let winnerMessage = '';

            // التحكم باللمس (لمس أفقي)
            let touchX = null;
            let touchActive = false;

            // متغيرات السرعة والوقت
            let gameTime = 0;
            let lastTimestamp = 0;
            let isSpeedUpActive = false;

            // ---- دوال مساعدة ----
            function getCurrentSpeed() {
                let baseSpeed = BALL_SPEED_INIT;
                if (gameTime > SPEED_UP_DELAY) {
                    const extra = (gameTime - SPEED_UP_DELAY) * BALL_ACCEL_PER_SECOND;
                    return Math.min(baseSpeed + extra, BALL_MAX_SPEED);
                }
                return baseSpeed;
            }

            function applySpeedToBall() {
                const currentSpeed = getCurrentSpeed();
                const currentAngle = Math.atan2(ball.vy, ball.vx);
                ball.vx = currentSpeed * Math.cos(currentAngle);
                ball.vy = currentSpeed * Math.sin(currentAngle);
                if (Math.abs(ball.vx) < 0.5) ball.vx = currentSpeed * (ball.vx >= 0 ? 1 : -1);
                if (Math.abs(ball.vy) < 0.5) ball.vy = currentSpeed * (ball.vy >= 0 ? 1 : -1);
            }

            function resetBall(direction) {
                // direction: 1 = نحو الأسفل (اللاعب), -1 = نحو الأعلى (AI)
                ball.x = CANVAS_W/2 + (Math.random() * 60 - 30);
                ball.y = CANVAS_H/2;
                const angle = (Math.random() * 0.8 + 0.2) * (Math.random() > 0.5 ? 1 : -1);
                const speed = getCurrentSpeed();
                // في النسخة العمودية: الكرة تتحرك عمودياً أساساً
                ball.vx = angle * 1.8;
                ball.vy = speed * (direction || (Math.random() > 0.5 ? 1 : -1));
                if (Math.abs(ball.vx) < 0.8) ball.vx = 0.8 * (ball.vx >= 0 ? 1 : -1);
                if (Math.abs(ball.vy) < 0.8) ball.vy = 0.8 * (ball.vy >= 0 ? 1 : -1);
            }

            function fullReset() {
                playerX = (CANVAS_W - PADDLE_W) / 2;
                aiX = (CANVAS_W - PADDLE_W) / 2;
                playerScore = 0;
                aiScore = 0;
                gameOver = false;
                winnerMessage = '';
                gameTime = 0;
                isSpeedUpActive = false;
                timerDisplay.textContent = '0';

                playerScoreEl.textContent = '0';
                aiScoreEl.textContent = '0';

                ball.x = CANVAS_W/2;
                ball.y = CANVAS_H/2;
                ball.vx = 0;
                ball.vy = 0;

                gameActive = true;
                gamePaused = true;

                if (aiEnabled) {
                    aiEnabled = false;
                    startAIbtn.disabled = false;
                    startAIbtn.textContent = '▶ AI';
                    startAIbtn.style.opacity = '1';
                    startAIbtn.style.cursor = 'pointer';
                }

                touchX = null;
                touchActive = false;
                lastTimestamp = 0;
            }

            function startAI() {
                if (gameOver) {
                    fullReset();
                }
                aiEnabled = true;
                gamePaused = false;
                gameActive = true;
                gameOver = false;
                winnerMessage = '';
                gameTime = 0;
                timerDisplay.textContent = '0';
                lastTimestamp = performance.now();

                if (ball.vx === 0 && ball.vy === 0) {
                    resetBall(1);
                } else {
                    applySpeedToBall();
                }

                startAIbtn.textContent = '⚡ مفعل';
                startAIbtn.disabled = true;
                startAIbtn.style.opacity = '0.7';
                startAIbtn.style.cursor = 'default';
            }

            function checkWinCondition() {
                if (playerScore >= WIN_SCORE) {
                    gameOver = true;
                    gameActive = false;
                    gamePaused = true;
                    winnerMessage = '🎉 فزت!';
                    return true;
                } else if (aiScore >= WIN_SCORE) {
                    gameOver = true;
                    gameActive = false;
                    gamePaused = true;
                    winnerMessage = '😞 خسرت!';
                    return true;
                }
                return false;
            }

            function scorePoint(winner) {
                if (gameOver) return;

                if (winner === 'player') {
                    playerScore++;
                    playerScoreEl.textContent = playerScore;
                    if (!checkWinCondition()) {
                        resetBall(-1); // الكرة تتجه للأعلى (نحو AI)
                    }
                } else {
                    aiScore++;
                    aiScoreEl.textContent = aiScore;
                    if (!checkWinCondition()) {
                        resetBall(1); // الكرة تتجه للأسفل (نحو اللاعب)
                    }
                }

                if (!gameOver) {
                    gameActive = true;
                    if (!aiEnabled) {
                        gamePaused = true;
                        ball.vx = 0;
                        ball.vy = 0;
                    } else {
                        gamePaused = false;
                    }
                } else {
                    ball.vx = 0;
                    ball.vy = 0;
                    gamePaused = true;
                    gameActive = false;
                }
            }

            // ---- تحديث الفيزياء ----
            function update(timestamp) {
                if (!gameActive || gamePaused || gameOver) return;

                if (lastTimestamp === 0) lastTimestamp = timestamp;
                const delta = (timestamp - lastTimestamp) / 1000;
                lastTimestamp = timestamp;

                if (delta > 0 && delta < 0.1) {
                    gameTime += delta;
                    timerDisplay.textContent = Math.floor(gameTime);
                    if (gameTime > SPEED_UP_DELAY) {
                        isSpeedUpActive = true;
                        applySpeedToBall();
                    }
                }

                // 1. تحريك مضرب اللاعب (أفقي)
                if (touchActive && touchX !== null) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = CANVAS_W / rect.width;
                    const canvasX = (touchX - rect.left) * scaleX;
                    let targetX = canvasX - PADDLE_W/2;
                    targetX = Math.max(LEFT_WALL, Math.min(targetX, RIGHT_WALL - PADDLE_W));
                    playerX = targetX;
                }

                // 2. الذكاء الاصطناعي (يتحرك أفقياً)
                if (aiEnabled) {
                    const aiCenter = aiX + PADDLE_W/2;
                    const ballCenter = ball.x + ball.size/2;
                    // إذا كانت الكرة تتجه نحو AI (للأعلى) أو قريبة منه
                    if (ball.vy < 0 && ball.y < CANVAS_H/2 + 30) {
                        if (aiCenter < ballCenter - 6 && aiX + PADDLE_W < RIGHT_WALL) {
                            aiX += AI_SPEED * 0.95;
                        } else if (aiCenter > ballCenter + 6 && aiX > LEFT_WALL) {
                            aiX -= AI_SPEED * 0.95;
                        }
                    } else if (ball.vy > 0 && ball.y > CANVAS_H/2 - 30) {
                        // الكرة بعيدة، تحرك نحو المنتصف
                        const targetX = (CANVAS_W - PADDLE_W) / 2;
                        if (Math.abs(aiCenter - targetX) > 30) {
                            if (aiCenter < targetX && aiX + PADDLE_W < RIGHT_WALL) aiX += AI_SPEED * 0.25;
                            else if (aiCenter > targetX && aiX > LEFT_WALL) aiX -= AI_SPEED * 0.25;
                        }
                    } else {
                        const targetX = (CANVAS_W - PADDLE_W) / 2;
                        if (Math.abs(aiCenter - targetX) > 40) {
                            if (aiCenter < targetX && aiX + PADDLE_W < RIGHT_WALL) aiX += AI_SPEED * 0.2;
                            else if (aiCenter > targetX && aiX > LEFT_WALL) aiX -= AI_SPEED * 0.2;
                        }
                    }
                    aiX = Math.max(LEFT_WALL, Math.min(aiX, RIGHT_WALL - PADDLE_W));
                }

                // 3. حركة الكرة
                ball.x += ball.vx;
                ball.y += ball.vy;

                // التصادم مع الجدران الجانبية (يمين/يسار)
                if (ball.x <= LEFT_WALL) {
                    ball.x = LEFT_WALL;
                    ball.vx = -ball.vx;
                } else if (ball.x + ball.size >= RIGHT_WALL) {
                    ball.x = RIGHT_WALL - ball.size;
                    ball.vx = -ball.vx;
                }

                // التصادم مع المضارب (العلوي والسفلي)
                const playerRect = { x: playerX, y: BOTTOM_WALL - PADDLE_H, w: PADDLE_W, h: PADDLE_H };
                const aiRect = { x: aiX, y: TOP_WALL, w: PADDLE_W, h: PADDLE_H };
                const ballRect = { x: ball.x, y: ball.y, w: ball.size, h: ball.size };

                function rectCollide(r1, r2) {
                    return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
                           r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
                }

                // تصادم مع مضرب اللاعب (أسفل)
                if (rectCollide(ballRect, playerRect) && ball.vy > 0) {
                    const relativeX = (ball.x + ball.size/2) - (playerX + PADDLE_W/2);
                    const normalized = relativeX / (PADDLE_W/2);
                    const angle = normalized * 1.2;
                    const currentSpeed = getCurrentSpeed();
                    const speed = Math.min(currentSpeed + 0.2, BALL_MAX_SPEED);
                    ball.vx = speed * Math.sin(angle);
                    ball.vy = -speed * Math.cos(angle);
                    if (ball.vy > 0) ball.vy = -ball.vy;
                    if (Math.abs(ball.vx) < 0.5) ball.vx = 0.8 * (ball.vx >= 0 ? 1 : -1);
                    ball.y = playerRect.y - ball.size - 1;
                }

                // تصادم مع مضرب AI (أعلى)
                if (aiEnabled && rectCollide(ballRect, aiRect) && ball.vy < 0) {
                    const relativeX = (ball.x + ball.size/2) - (aiX + PADDLE_W/2);
                    const normalized = relativeX / (PADDLE_W/2);
                    const angle = normalized * 1.2;
                    const currentSpeed = getCurrentSpeed();
                    const speed = Math.min(currentSpeed + 0.2, BALL_MAX_SPEED);
                    ball.vx = speed * Math.sin(angle);
                    ball.vy = speed * Math.cos(angle);
                    if (ball.vy < 0) ball.vy = -ball.vy;
                    if (Math.abs(ball.vx) < 0.5) ball.vx = 0.8 * (ball.vx >= 0 ? 1 : -1);
                    ball.y = aiRect.y + aiRect.h + 1;
                }

                // تسجيل الأهداف (إذا خرجت من الأعلى أو الأسفل)
                if (!gameOver) {
                    if (ball.y + ball.size > CANVAS_H + 10) {
                        scorePoint('ai');
                    } else if (ball.y < -10) {
                        scorePoint('player');
                    }
                }

                // حماية
                if (ball.x < LEFT_WALL) ball.x = LEFT_WALL;
                if (ball.x + ball.size > RIGHT_WALL) ball.x = RIGHT_WALL - ball.size;
                if (ball.y < -20) ball.y = 20;
                if (ball.y + ball.size > CANVAS_H + 20) ball.y = CANVAS_H - ball.size - 20;
            }

            // ---- الرسم ----
            function draw() {
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

                // خطوط الملعب العمودي
                ctx.shadowColor = 'rgba(60, 130, 255, 0.15)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.strokeStyle = '#2e3d60';
                ctx.lineWidth = 2;
                ctx.setLineDash([18, 22]);
                ctx.moveTo(10, CANVAS_H/2);
                ctx.lineTo(CANVAS_W - 10, CANVAS_H/2);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.beginPath();
                ctx.strokeStyle = '#263454';
                ctx.lineWidth = 2.5;
                ctx.arc(CANVAS_W/2, CANVAS_H/2, 60, 0, Math.PI*2);
                ctx.stroke();

                // مضارب (أفقية)
                ctx.shadowBlur = 28;
                ctx.shadowColor = 'rgba(70, 150, 255, 0.6)';
                ctx.fillStyle = '#4b8cff';
                ctx.shadowColor = 'rgba(70, 150, 255, 0.7)';
                ctx.beginPath();
                ctx.roundRect(playerX, BOTTOM_WALL - PADDLE_H, PADDLE_W, PADDLE_H, 6);
                ctx.fill();

                ctx.fillStyle = '#ff5f87';
                ctx.shadowColor = 'rgba(255, 100, 150, 0.7)';
                ctx.beginPath();
                ctx.roundRect(aiX, TOP_WALL, PADDLE_W, PADDLE_H, 6);
                ctx.fill();

                // الكرة
                ctx.shadowBlur = 45;
                ctx.shadowColor = '#9bc0ff';
                ctx.fillStyle = '#e6f0ff';
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2, ball.y + ball.size/2, ball.size/2, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 80;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(ball.x + ball.size/2 - 2, ball.y + ball.size/2 - 2, ball.size/3, 0, Math.PI*2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // مؤشر السرعة
                if (isSpeedUpActive && !gameOver && !gamePaused) {
                    ctx.font = '14px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#f0e68c';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(255, 200, 50, 0.3)';
                    const speedPercent = Math.round(((getCurrentSpeed() - BALL_SPEED_INIT) / (BALL_MAX_SPEED - BALL_SPEED_INIT)) * 100);
                    ctx.fillText(`⚡ ${speedPercent}%`, CANVAS_W/2, 44);
                    ctx.shadowBlur = 0;
                }

                // رسالة الانتظار
                if (gamePaused && !aiEnabled && !gameOver) {
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'rgba(180, 210, 255, 0.9)';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = 'rgba(70, 150, 255, 0.5)';
                    ctx.fillText('👆 اضغط "AI"', CANVAS_W/2, CANVAS_H/2 + 60);
                    ctx.shadowBlur = 0;
                }

                // رسالة الفوز / الخسارة
                if (gameOver && winnerMessage) {
                    ctx.shadowBlur = 50;
                    ctx.shadowColor = 'rgba(255, 200, 50, 0.6)';
                    ctx.font = 'bold 56px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.roundRect(CANVAS_W/2 - 150, CANVAS_H/2 - 60, 300, 120, 30);
                    ctx.fill();

                    ctx.shadowBlur = 40;
                    ctx.shadowColor = 'rgba(255, 215, 0, 0.5)';
                    ctx.fillStyle = winnerMessage.includes('فزت') ? '#7dffb3' : '#ff7b8a';
                    ctx.fillText(winnerMessage, CANVAS_W/2, CANVAS_H/2 - 6);

                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(100, 150, 255, 0.3)';
                    ctx.font = '16px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#aac0f0';
                    ctx.fillText('اضغط "↻" للعب مجدداً', CANVAS_W/2, CANVAS_H/2 + 60);

                    ctx.shadowBlur = 0;
                    ctx.textBaseline = 'alphabetic';
                }
            }

            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            // ---- حلقة اللعبة ----
            function gameLoop(timestamp) {
                update(timestamp);
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ---- أحداث اللمس ----
            function handleTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    touchX = touch.clientX;
                    touchActive = true;
                }
            }

            function handleTouchMove(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    touchX = touch.clientX;
                    touchActive = true;
                }
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                touchActive = false;
                touchX = null;
            }

            function handleTouchCancel(e) {
                e.preventDefault();
                touchActive = false;
                touchX = null;
            }

            function preventMouse(e) {
                e.preventDefault();
            }

            // ---- أزرار ----
            resetBtn.addEventListener('click', function() {
                fullReset();
                if (gameOver) {
                    gameOver = false;
                    winnerMessage = '';
                    startAIbtn.disabled = false;
                    startAIbtn.textContent = '▶ AI';
                    startAIbtn.style.opacity = '1';
                    startAIbtn.style.cursor = 'pointer';
                    aiEnabled = false;
                }
                isSpeedUpActive = false;
                timerDisplay.textContent = '0';
            });

            startAIbtn.addEventListener('click', function() {
                if (gameOver) {
                    fullReset();
                }
                if (!aiEnabled) {
                    startAI();
                }
            });

            // ---- تهيئة ----
            gameActive = true;
            gamePaused = true;
            aiEnabled = false;
            gameOver = false;
            winnerMessage = '';
            gameTime = 0;
            isSpeedUpActive = false;
            timerDisplay.textContent = '0';

            ball.vx = 0;
            ball.vy = 0;
            ball.x = CANVAS_W/2;
            ball.y = CANVAS_H/2;
            playerScore = 0;
            aiScore = 0;
            playerScoreEl.textContent = '0';
            aiScoreEl.textContent = '0';

            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });

            canvas.addEventListener('mousedown', preventMouse);
            canvas.addEventListener('mousemove', preventMouse);
            canvas.addEventListener('mouseup', preventMouse);
            canvas.addEventListener('click', preventMouse);

            requestAnimationFrame(gameLoop);

            window.addEventListener('unload', function() {
                canvas.removeEventListener('touchstart', handleTouchStart);
                canvas.removeEventListener('touchmove', handleTouchMove);
                canvas.removeEventListener('touchend', handleTouchEnd);
                canvas.removeEventListener('touchcancel', handleTouchCancel);
            });

        })();
    </script>
</body>
</html>
